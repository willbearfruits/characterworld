class Browser {
  constructor(){
    this.history = [];
    this.histIdx = -1;
    this.url = '';
    this.input = '';
    this.editing = false;
    this.scroll = 0;
    this.bookmarks = [
      {label:'HOME',    url:'char://home'},
      {label:'ATLAS',   url:'char://atlas'},
      {label:'GLYPHS',  url:'char://glyphs'},
      {label:'WIKI',    url:'https://en.wikipedia.org/wiki/ASCII_art'},
      {label:'HN',      url:'https://news.ycombinator.com/'},
      {label:'WIBY',    url:'https://wiby.me/'},
      {label:'NEOCITY', url:'https://neocities.org/'},
    ];
    this.hits = [];
    this.linkHits = [];
    this.fetched = null;   // {url, lines: [...] } when last fetch succeeded
    this.loading = false;
    this.error = null;
  }
  _normalize(u){
    u = (u||'').trim();
    if(!u) return '';
    if(u.startsWith('char://')) return u;
    if(u.startsWith('app://')) return u;
    if(/^https?:\/\//i.test(u)) return u;
    if(u.startsWith('//')) return 'https:'+u;
    // looks like a domain → assume https
    if(/^[a-z0-9.-]+\.[a-z]{2,}(\/.*)?$/i.test(u)) return 'https://'+u;
    // free text → search the duck via jina (rendered as text)
    return 'https://duckduckgo.com/html/?q='+encodeURIComponent(u);
  }
  async _fetchWeb(url){
    this.loading = true;
    this.error = null;
    this.fetched = null;
    this.scroll = 0;
    const fetchUrl = url;
    try {
      // r.jina.ai is a CORS-friendly text-extraction service that returns
      // markdown for any URL. perfect for the typewritten internet.
      const r = await fetch('https://r.jina.ai/'+url, {
        headers: {'Accept':'text/markdown, text/plain;q=0.9, */*;q=0.5'},
      });
      if(!r.ok) throw new Error('HTTP '+r.status);
      const text = await r.text();
      // ignore stale responses if user navigated away in the meantime
      if(this.url !== fetchUrl) return;
      this.fetched = { url, body: text.slice(0, 80_000) };
    } catch(e){
      if(this.url !== fetchUrl) return;
      this.error = (e && e.message) ? e.message : String(e);
    } finally {
      if(this.url === fetchUrl) this.loading = false;
    }
  }
  mount(){
    this.win.canvasEl.addEventListener('mousedown', (e)=>this._onClick(e));
    this.win.canvasEl.addEventListener('wheel', (e)=>{
      this.scroll = Math.max(0, this.scroll + Math.sign(e.deltaY)*2);
      e.preventDefault();
    }, {passive:false});
    this.navigate('char://home');
  }
  resize(){}
  _focusInput(){ this.editing = true; this.input = this.url; }
  navigate(url){
    const u = this._normalize(url);
    if(!u) return;
    if(u.startsWith('app://')){
      const id = u.slice('app://'.length).replace(/\/$/, '');
      const a = appById(id);
      if(a) spawnWindow(a);
      return;
    }
    this.history = this.history.slice(0, this.histIdx+1);
    this.history.push(u);
    this.histIdx = this.history.length-1;
    this.url = u;
    this.input = u;
    this.scroll = 0;
    this.editing = false;
    this.fetched = null;
    this.error = null;
    this.loading = false;
    if(/^https?:\/\//i.test(u)) this._fetchWeb(u);
  }
  back(){
    if(this.histIdx>0){
      this.histIdx--;
      this.url = this.input = this.history[this.histIdx];
      this.scroll = 0;
      this.fetched = null; this.error = null;
      if(/^https?:\/\//i.test(this.url)) this._fetchWeb(this.url);
    }
  }
  forward(){
    if(this.histIdx<this.history.length-1){
      this.histIdx++;
      this.url = this.input = this.history[this.histIdx];
      this.scroll = 0;
      this.fetched = null; this.error = null;
      if(/^https?:\/\//i.test(this.url)) this._fetchWeb(this.url);
    }
  }
  reload(){
    this.scroll = 0;
    if(/^https?:\/\//i.test(this.url)) this._fetchWeb(this.url);
  }
  onKey(e){
    if(this.editing){
      if(e.key==='Enter'){ this.editing=false; this.navigate(this.input); e.preventDefault(); return true; }
      if(e.key==='Escape'){ this.editing=false; this.input=this.url; return true; }
      if(e.key==='Backspace'){ this.input=this.input.slice(0,-1); return true; }
      if(e.key.length===1 && !e.metaKey && !e.ctrlKey){ this.input += e.key; return true; }
      return true;
    }
    if(e.key==='l' && (e.metaKey||e.ctrlKey)){ e.preventDefault(); this._focusInput(); return true; }
    if(e.key==='r' && (e.metaKey||e.ctrlKey)){ e.preventDefault(); this.reload(); return true; }
    if(e.key==='ArrowDown'){ this.scroll++; return true; }
    if(e.key==='ArrowUp'){ this.scroll = Math.max(0, this.scroll-1); return true; }
    if(e.key==='PageDown'){ this.scroll += 8; return true; }
    if(e.key==='PageUp'){ this.scroll = Math.max(0, this.scroll-8); return true; }
    if(e.key==='Backspace'){ this.back(); return true; }
    return false;
  }
  _onClick(e){
    const r = this.win.canvasEl.getBoundingClientRect();
    const x = e.clientX - r.left, y = e.clientY - r.top;
    for(const h of this.hits){
      if(x>=h.x && x<h.x+h.w && y>=h.y && y<h.y+h.h){ h.action(); return; }
    }
    for(const h of this.linkHits){
      if(x>=h.x && x<h.x+h.w && y>=h.y && y<h.y+h.h){ h.action(); return; }
    }
  }
  draw(){
    const c = this.win.ctx;
    const W = this.win.pixW, H = this.win.pixH;
    c.fillStyle = BG; c.fillRect(0,0,W,H);
    const cs = Math.max(11, Math.floor(Math.min(W/72, H/30)));
    const put = makePut(c, cs);
    const cols = Math.floor(W/cs), rows = Math.floor(H/cs);

    // outer border
    for(let cc=1;cc<cols-1;cc++){ put.put('═', cc, 0, MID, 0.8); put.put('═', cc, rows-1, MID, 0.8); }
    for(let rr=1;rr<rows-1;rr++){ put.put('║', 0, rr, MID, 0.8); put.put('║', cols-1, rr, MID, 0.8); }
    put.put('╔',0,0,MID,1); put.put('╗',cols-1,0,MID,1); put.put('╚',0,rows-1,MID,1); put.put('╝',cols-1,rows-1,MID,1);

    this.hits = [];
    this.linkHits = [];

    // ── chrome row (nav, url) ──
    const navs = [
      {l:'◂', a:()=>this.back(), col:SKY, en:this.histIdx>0},
      {l:'▸', a:()=>this.forward(), col:SKY, en:this.histIdx<this.history.length-1},
      {l:'↻', a:()=>this.reload(), col:LIM, en:true},
      {l:'⌂', a:()=>this.navigate('char://home'), col:SUN, en:true},
    ];
    let cx = 2;
    for(const n of navs){
      const a = n.en ? 0.95 : 0.3;
      put.put('[', cx, 1, MID, a);
      put.put(n.l, cx+1, 1, n.col, a);
      put.put(']', cx+2, 1, MID, a);
      if(n.en) this.hits.push({x:cx*cs, y:cs, w:3*cs, h:cs, action:n.a});
      cx += 4;
    }
    put.put('│', cx, 1, LOW, 0.6); cx += 2;
    // url bar
    const urlMax = cols - cx - 3;
    const shown = (this.editing ? this.input : this.url).slice(0, urlMax-1);
    put.text(shown, cx, 1, this.editing ? CURSOR : ACC, 1);
    if(this.editing){
      put.put(Math.floor(t/30)%2===0 ? '█' : '▒', cx+shown.length, 1, CURSOR, 0.9);
    }
    this.hits.push({x:cx*cs, y:cs, w:urlMax*cs, h:cs, action:()=>this._focusInput()});

    // ── bookmarks row ──
    let bx = 2;
    put.put('☆', bx, 2, SUN, 0.95); bx += 2;
    for(let bi=0; bi<this.bookmarks.length; bi++){
      const b = this.bookmarks[bi];
      const ww = b.label.length+2;
      if(bx + ww > cols-2) break;
      const col = RAINBOW[bi % RAINBOW.length];
      const here = this.url === b.url;
      put.put('[', bx, 2, MID, 0.6);
      put.text(b.label, bx+1, 2, here ? CURSOR : col, here ? 1 : 0.92);
      put.put(']', bx+1+b.label.length, 2, MID, 0.6);
      this.hits.push({x:bx*cs, y:2*cs, w:ww*cs, h:cs, action:()=>this.navigate(b.url)});
      bx += ww + 1;
    }

    // separator
    for(let i=1;i<cols-1;i++) put.put('─', i, 3, LOW, 0.5);

    // ── content area: render the page ──
    const contentR0 = 5, contentR1 = rows - 3;
    const contentW = cols - 6;
    let lines;
    let pageTitle;
    if(this.url.startsWith('char://')){
      const page = PAGES[this.url] || PAGES['char://404'];
      pageTitle = page.title;
      lines = this._layout(page, contentW);
    } else if(this.loading){
      pageTitle = 'fetching ' + this.url;
      const dots = '·'.repeat(1 + Math.floor(t/15)%4);
      lines = [
        {k:'blank'},
        {k:'h2', text:'fetching · '+this.url},
        {k:'p',  text:'asking the typewritten ether for this page '+dots},
        {k:'p',  text:'(text comes back; pixels do not.)'},
      ];
    } else if(this.error){
      pageTitle = 'fetch failed';
      lines = [
        {k:'blank'},
        {k:'h2', text:'fetch failed'},
        {k:'p',  text:this.error},
        {k:'p',  text:'the wider net sometimes refuses to be typed.'},
        {k:'link', text:'try again', href:this.url},
        {k:'link', text:'go home',   href:'char://home'},
      ];
    } else if(this.fetched){
      pageTitle = this.url;
      lines = this._layoutWeb(this.fetched.body, contentW);
    } else {
      pageTitle = this.url;
      lines = [{k:'p', text:'(empty)'}];
    }
    const visible = contentR1 - contentR0;
    if(this.scroll > Math.max(0, lines.length - visible)) this.scroll = Math.max(0, lines.length - visible);

    // page title strip
    put.text(' '+pageTitle.slice(0, cols-6)+' ', 3, 4, INK, 1);
    // a thin bar of accent colors
    for(let i=0;i<cols-6;i++){
      const col = RAINBOW[(i + Math.floor(t/40)) % RAINBOW.length];
      put.put('▔', 3+i, contentR0-1, col, 0.5);
    }

    for(let li=0; li<visible && li+this.scroll<lines.length; li++){
      const ln = lines[li+this.scroll];
      const r = contentR0 + li;
      this._drawLine(put, ln, 3, r, contentW, cs);
    }

    // scroll indicator
    if(lines.length > visible){
      const total = lines.length, top = this.scroll, bot = top+visible;
      const trackH = visible;
      const knobH = Math.max(1, Math.floor(visible * visible / total));
      const knobY = Math.floor(top * (trackH - knobH) / Math.max(1, total - visible));
      for(let i=0;i<trackH;i++){
        const inKnob = i >= knobY && i < knobY + knobH;
        put.put(inKnob ? '█' : '│', cols-2, contentR0+i, inKnob ? ACC : LOW, inKnob ? 0.85 : 0.4);
      }
      put.text((top+1)+'-'+Math.min(bot,total)+'/'+total, 3, rows-2, MID, 0.7);
    } else {
      put.text(' end ', 3, rows-2, MID, 0.6);
    }
  }
  _layout(page, w){
    const out = [];
    for(const block of page.body){
      const kind = block[0];
      if(kind==='h1'){ out.push({k:'h1', text:block[1].toUpperCase()}); out.push({k:'rule'}); out.push({k:'blank'}); }
      else if(kind==='h2'){ out.push({k:'h2', text:block[1]}); out.push({k:'blank'}); }
      else if(kind==='h3'){ out.push({k:'h3', text:block[1]}); }
      else if(kind==='p'){
        for(const wl of this._wrap(block[1], w)) out.push({k:'p', text:wl});
        out.push({k:'blank'});
      }
      else if(kind==='quote'){
        for(const wl of this._wrap(block[1], w-2)) out.push({k:'quote', text:wl});
        out.push({k:'blank'});
      }
      else if(kind==='code'){ out.push({k:'code', text:block[1]}); }
      else if(kind==='li'){ for(const wl of this._wrap('· '+block[1], w-2)) out.push({k:'li', text:wl}); }
      else if(kind==='kv'){ out.push({k:'kv', text:block[1].padEnd(14,' ')+block[2]}); }
      else if(kind==='hr'){ out.push({k:'rule'}); out.push({k:'blank'}); }
      else if(kind==='link'){ out.push({k:'link', text:block[2], href:block[1]}); }
      else if(kind==='app'){ out.push({k:'app', appId:block[1], text:block[2]}); }
      else if(kind==='art'){ for(const ln of block[1]) out.push({k:'art', text:ln}); out.push({k:'blank'}); }
    }
    return out;
  }
  _wrap(text, w){
    const words = text.split(/\s+/);
    const out = [];
    let cur = '';
    for(const wd of words){
      if((cur+' '+wd).trim().length > w){ if(cur) out.push(cur); cur = wd; }
      else cur = (cur ? cur+' '+wd : wd);
    }
    if(cur) out.push(cur);
    return out;
  }
  _layoutWeb(text, w){
    // r.jina.ai returns markdown, often prefixed with "Title: ..." and
    // "URL Source: ..." headers. parse it into our line model.
    const out = [];
    const raw = text.replace(/\r/g,'').split('\n');
    let i = 0;
    let title = '', url = '';
    // strip jina header
    while(i < raw.length){
      const ln = raw[i];
      if(/^Title:\s*/.test(ln)){ title = ln.replace(/^Title:\s*/, ''); i++; continue; }
      if(/^URL Source:\s*/.test(ln)){ url = ln.replace(/^URL Source:\s*/, ''); i++; continue; }
      if(/^Markdown Content:\s*$/.test(ln)){ i++; continue; }
      if(/^Published Time:/.test(ln) || /^Description:/.test(ln) || /^Warning:/.test(ln) || /^Image \d+:/.test(ln)){ i++; continue; }
      if(ln.trim()==='') { i++; continue; }
      break;
    }
    if(title){ out.push({k:'h1', text: title.toUpperCase()}); out.push({k:'rule'}); out.push({k:'blank'}); }
    if(url) { out.push({k:'meta', text: url}); out.push({k:'blank'}); }
    let inCode = false;
    for(; i<raw.length; i++){
      let ln = raw[i];
      if(/^```/.test(ln)){ inCode = !inCode; out.push({k:'rule'}); continue; }
      if(inCode){ out.push({k:'code', text: ln}); continue; }
      if(/^\s*$/.test(ln)){ out.push({k:'blank'}); continue; }
      if(/^# /.test(ln)){ out.push({k:'h1', text: ln.slice(2)}); out.push({k:'rule'}); continue; }
      if(/^## /.test(ln)){ out.push({k:'h2', text: ln.slice(3)}); continue; }
      if(/^### /.test(ln)){ out.push({k:'h3', text: ln.slice(4)}); continue; }
      if(/^#### /.test(ln)){ out.push({k:'h3', text: ln.slice(5)}); continue; }
      if(/^>\s?/.test(ln)){
        for(const wl of this._wrap(ln.replace(/^>\s?/,''), w-2)) out.push({k:'quote', text: wl});
        continue;
      }
      if(/^[-*]\s/.test(ln)){
        const item = ln.replace(/^[-*]\s/, '');
        const segs = this._splitMd(item);
        const wrapped = this._wrapSegs([{t:'· ', s:'plain'}].concat(segs), w-2);
        for(const wl of wrapped) out.push({k:'liseg', segs:wl});
        continue;
      }
      if(/^\s{4,}|\t/.test(ln)){
        out.push({k:'code', text: ln.replace(/^\s{4}/, '')}); continue;
      }
      if(/^\|/.test(ln)){
        // markdown table row → render as plain
        out.push({k:'code', text: ln}); continue;
      }
      if(/^---+$/.test(ln) || /^\*\*\*+$/.test(ln)){ out.push({k:'rule'}); continue; }
      // inline → segments (may contain links)
      const segs = this._splitMd(ln);
      const wrapped = this._wrapSegs(segs, w);
      for(const wl of wrapped) out.push({k:'pseg', segs:wl});
    }
    return out;
  }
  _splitMd(text){
    // splits a line into [{t,s}] where s = 'plain'|'link'|'bold'|'em'|'code', t = visible text, h = href if link
    const out = [];
    let i = 0;
    const re = /(\[([^\]]+)\]\(([^)]+)\))|(\*\*([^*]+)\*\*)|(\*([^*]+)\*)|(`([^`]+)`)|(https?:\/\/\S+)/;
    while(i < text.length){
      const sub = text.slice(i);
      const m = sub.match(re);
      if(!m){ out.push({t:sub, s:'plain'}); break; }
      if(m.index > 0) out.push({t: sub.slice(0, m.index), s:'plain'});
      if(m[1]) out.push({t:m[2], s:'link', h:m[3]});
      else if(m[4]) out.push({t:m[5], s:'bold'});
      else if(m[6]) out.push({t:m[7], s:'em'});
      else if(m[8]) out.push({t:m[9], s:'code'});
      else if(m[10]) out.push({t:m[10], s:'link', h:m[10]});
      i += m.index + m[0].length;
    }
    return out.filter(o=>o.t);
  }
  _wrapSegs(segs, w){
    // wrap segments into lines of width w, preserving styles
    const out = [[]];
    let curLen = 0;
    for(const seg of segs){
      const words = seg.t.split(/(\s+)/);
      for(const wd of words){
        if(!wd) continue;
        if(curLen + wd.length > w && wd.trim()){
          out.push([]); curLen = 0;
        }
        out[out.length-1].push({t:wd, s:seg.s, h:seg.h});
        curLen += wd.length;
      }
    }
    return out.filter(line => line.some(s=>s.t.trim().length));
  }
  _drawLine(put, ln, c0, r, w, cs){
    if(ln.k==='blank') return;
    if(ln.k==='rule'){
      for(let i=0;i<w;i++) put.put('─', c0+i, r, LOW, 0.5);
      return;
    }
    if(ln.k==='h1'){
      // multi-color heading
      for(let i=0;i<ln.text.length;i++){
        const col = ln.text[i]===' ' ? INK : RAINBOW[(i+Math.floor(t/16))%RAINBOW.length];
        put.put(ln.text[i], c0+i, r, col, 1);
      }
      return;
    }
    if(ln.k==='h2'){ put.text(ln.text, c0, r, SUN, 1); return; }
    if(ln.k==='h3'){ put.text(ln.text, c0, r, AQU, 0.95); return; }
    if(ln.k==='p'){ put.text(ln.text, c0, r, INK, 0.95); return; }
    if(ln.k==='code'){ put.text(ln.text.slice(0,w), c0, r, LIM, 0.95); return; }
    if(ln.k==='li'){ put.text(ln.text, c0, r, PHERO, 0.95); return; }
    if(ln.k==='kv'){
      // split at first 14 cols → key
      const key = ln.text.slice(0,14), val = ln.text.slice(14);
      put.text(key, c0, r, CURSOR, 1);
      put.text(val, c0+14, r, INK, 0.95);
      return;
    }
    if(ln.k==='quote'){
      put.put('▎', c0, r, VIO, 0.85);
      put.text(ln.text, c0+2, r, VIO, 0.95);
      return;
    }
    if(ln.k==='art'){ put.text(ln.text, c0, r, ACC, 0.9); return; }
    if(ln.k==='link'){
      const arrow = '→ ';
      put.text(arrow, c0, r, MID, 0.7);
      const hov = false; // no hover state for now
      put.text(ln.text, c0+arrow.length, r, ACC, 0.95);
      // underline on hover-like
      for(let i=0;i<ln.text.length;i++) put.put('▁', c0+arrow.length+i, r, ACC, 0.4);
      this.linkHits.push({
        x:(c0)*cs, y:r*cs, w:(arrow.length+ln.text.length)*cs, h:cs,
        action: ()=>this.navigate(ln.href),
      });
      return;
    }
    if(ln.k==='app'){
      const a = appById(ln.appId);
      const col = a ? (a.accent||HI) : HI;
      put.put('▶', c0, r, col, 1);
      put.text(' '+(a?a.label:ln.appId).padEnd(10,' ')+' '+ln.text, c0+1, r, INK, 0.95);
      this.linkHits.push({
        x:c0*cs, y:r*cs, w:w*cs, h:cs,
        action:()=> a && spawnWindow(a),
      });
      return;
    }
    if(ln.k==='meta'){ put.text(ln.text.slice(0,w), c0, r, MID, 0.7); return; }
    if(ln.k==='pseg' || ln.k==='liseg'){
      let cx = c0;
      for(const seg of ln.segs){
        if(!seg.t) continue;
        const remaining = w - (cx - c0);
        if(remaining <= 0) break;
        const visible = seg.t.slice(0, remaining);
        let col = INK, a = 0.95;
        if(seg.s==='link'){ col = ACC; a = 1; }
        else if(seg.s==='bold'){ col = LIM; a = 1; }
        else if(seg.s==='em'){ col = SUN; a = 0.95; }
        else if(seg.s==='code'){ col = LIM; a = 0.95; }
        put.text(visible, cx, r, col, a);
        if(seg.s==='link' && seg.h){
          // underline + register hit
          for(let i=0;i<visible.length;i++) put.put('▁', cx+i, r, ACC, 0.4);
          this.linkHits.push({
            x:cx*cs, y:r*cs, w:visible.length*cs, h:cs,
            action: ()=>this.navigate(seg.h),
          });
        }
        cx += visible.length;
        if(cx - c0 >= w) break;
      }
      return;
    }
  }
  destroy(){}
}

// BUILT-IN APP: FILES (file manager — two-pane)
// ─────────────────────────────────────────────────────────────────────────
class Files {
  constructor(){
    // virtual filesystem — apps and real text files at the project root
    this.root = {
      kind:'dir', name:'characterworld', open:true, children:[
        {kind:'app',  name:'charactershop/',   appId:'atelier'},
        {kind:'app',  name:'characterfilm/',   appId:'film'},
        {kind:'app',  name:'charactergrain/',  appId:'grain'},
        {kind:'app',  name:'charactertracker/',appId:'tracker'},
        {kind:'app',  name:'characterdelve/',  appId:'delve'},
        {kind:'file', name:'README.md',        src:'README.md',  mime:'md'},
        {kind:'file', name:'AGENTS.md',        src:'AGENTS.md',  mime:'md'},
        {kind:'file', name:'CLAUDE.md',        src:'CLAUDE.md',  mime:'md'},
        {kind:'dir',  name:'accessories', open:false, children:[
          {kind:'app', name:'browser', appId:'browser'},
          {kind:'app', name:'files',   appId:'files'},
          {kind:'app', name:'calc',    appId:'calc'},
          {kind:'app', name:'snake',   appId:'snake'},
          {kind:'app', name:'sort',    appId:'sort'},
          {kind:'app', name:'life',    appId:'life'},
          {kind:'app', name:'term',    appId:'term'},
          {kind:'app', name:'clock',   appId:'clock'},
          {kind:'app', name:'about',   appId:'about'},
        ]},
        {kind:'dir',  name:'system', open:false, children:[
          {kind:'file', name:'boot.log', text:bootLog()},
          {kind:'file', name:'kernel.txt', text:'characterworld/os v0.6\n— every glyph a pixel —\nhandcrafted by willbear · 2026\n'},
          {kind:'file', name:'palette.txt', text:Object.entries({HI,ACC,SUN,VIO,PNK,AQU,ORA,SKY,LIM,PHERO,WARN,CURSOR}).map(([k,v])=>k.padEnd(8,' ')+' '+v).join('\n')},
        ]},
      ]
    };
    this.selected = this.root.children[0];
    this.scroll = 0;
    this.preview = '';
    this.previewLoading = false;
    this.flatCache = null;
    this.cacheKey = '';
  }
  mount(){
    this.win.canvasEl.addEventListener('mousedown', (e)=>this._onClick(e));
    this.win.canvasEl.addEventListener('wheel', (e)=>{
      this.scroll = Math.max(0, this.scroll + Math.sign(e.deltaY));
      e.preventDefault();
    }, {passive:false});
  }
  resize(){}
  _flatten(){
    const key = this._dumpKey(this.root);
    if(this.flatCache && this.cacheKey===key) return this.flatCache;
    const out = [];
    const walk = (n, depth)=>{
      out.push({node:n, depth});
      if(n.kind==='dir' && n.open) for(const c of n.children) walk(c, depth+1);
    };
    walk(this.root, 0);
    this.flatCache = out;
    this.cacheKey = key;
    return out;
  }
  _dumpKey(n){
    if(n.kind!=='dir') return n.name;
    return n.name+'['+ (n.open?'o':'c') +':'+ n.children.map(c=>this._dumpKey(c)).join(',') +']';
  }
  _select(node){
    this.selected = node;
    this.preview = '';
    if(node.kind==='file'){
      if(node.text != null){ this.preview = node.text; return; }
      if(node.src){
        this.previewLoading = true;
        fetch(node.src).then(r=>r.ok ? r.text() : Promise.reject(r.status))
          .then(txt=>{ if(this.selected===node){ this.preview = txt; this.previewLoading=false; } })
          .catch(err=>{ if(this.selected===node){ this.preview = '! could not load — '+err; this.previewLoading=false; } });
      }
    }
  }
  _onClick(e){
    const r = this.win.canvasEl.getBoundingClientRect();
    const x = e.clientX - r.left, y = e.clientY - r.top;
    for(const h of this.hits||[]){
      if(x>=h.x && x<h.x+h.w && y>=h.y && y<h.y+h.h){ h.action(); return; }
    }
  }
  onKey(e){
    if(e.key==='ArrowDown'){ this.scroll++; e.preventDefault(); return true; }
    if(e.key==='ArrowUp'){ this.scroll = Math.max(0, this.scroll-1); e.preventDefault(); return true; }
    return false;
  }
  draw(){
    const c = this.win.ctx;
    const W = this.win.pixW, H = this.win.pixH;
    c.fillStyle = BG; c.fillRect(0,0,W,H);
    const cs = Math.max(11, Math.floor(Math.min(W/72, H/26)));
    const put = makePut(c, cs);
    const cols = Math.floor(W/cs), rows = Math.floor(H/cs);

    // outer border
    for(let cc=1;cc<cols-1;cc++){ put.put('═', cc, 0, MID, 0.8); put.put('═', cc, rows-1, MID, 0.8); }
    for(let rr=1;rr<rows-1;rr++){ put.put('║', 0, rr, MID, 0.8); put.put('║', cols-1, rr, MID, 0.8); }
    put.put('╔',0,0,MID,1); put.put('╗',cols-1,0,MID,1); put.put('╚',0,rows-1,MID,1); put.put('╝',cols-1,rows-1,MID,1);

    // title
    const titleStr = ' FILES · /'+this.root.name+' ';
    put.text(titleStr, 2, 0, SUN, 1);

    // split
    const splitC = Math.max(20, Math.floor(cols*0.42));
    for(let r=1; r<rows-1; r++) put.put('│', splitC, r, LOW, 0.6);
    put.put('╤', splitC, 0, MID, 0.95);
    put.put('╧', splitC, rows-1, MID, 0.95);

    // ─── LEFT PANE: tree ───
    this.hits = [];
    const list = this._flatten();
    const visible = rows - 4;
    if(this.scroll > Math.max(0, list.length - visible)) this.scroll = Math.max(0, list.length - visible);
    for(let li=0; li<visible && li+this.scroll<list.length; li++){
      const {node, depth} = list[li+this.scroll];
      const r = 2 + li;
      const isSel = node===this.selected;
      const indent = depth*2;
      let glyph = '·', col = INK;
      if(node.kind==='dir'){ glyph = node.open?'▾':'▸'; col = SUN; }
      else if(node.kind==='app'){ glyph = '◆'; col = (appById(node.appId)||{accent:HI}).accent || HI; }
      else if(node.kind==='file'){ glyph = '▤'; col = AQU; }
      // selection bar
      if(isSel){
        c.fillStyle = col; c.globalAlpha = 0.14;
        c.fillRect(2*cs, r*cs, (splitC-3)*cs, cs);
        c.globalAlpha = 1;
      }
      const x0 = 2 + indent;
      put.put(glyph, x0, r, col, 1);
      const lbl = ' '+node.name;
      const lblMax = splitC - 2 - x0 - 1;
      put.text(lbl.slice(0, lblMax), x0+1, r, isSel ? col : INK, isSel?1:0.92);
      this.hits.push({
        x: 2*cs, y: r*cs, w: (splitC-3)*cs, h: cs,
        action: ()=>{
          if(this.selected===node && node.kind==='dir'){ node.open = !node.open; this.flatCache = null; }
          else if(node.kind==='dir' && !node.open){ node.open = true; this.flatCache = null; this._select(node); }
          else { this._select(node); }
        },
      });
    }
    // bottom-of-list scroll hint
    if(list.length > visible){
      put.text(' '+(this.scroll+1)+'/'+list.length+' ', 2, rows-2, MID, 0.7);
    }

    // ─── RIGHT PANE: preview / actions ───
    const rx = splitC + 2;
    const rw = cols - splitC - 4;
    const sel = this.selected;
    if(sel){
      put.text(' '+sel.name+' ', rx, 1, sel.kind==='app' ? (appById(sel.appId)?.accent||HI) : sel.kind==='file' ? AQU : SUN, 1);
      // separator
      for(let cc=rx;cc<rx+rw;cc++) put.put('─', cc, 2, LOW, 0.5);

      if(sel.kind==='app'){
        const app = appById(sel.appId);
        if(app){
          // big ascii art rendered larger
          for(let i=0;i<app.art.length;i++){
            put.text(app.art[i], rx+2, 4+i, i%2 ? app.accent : (app.accent2||app.accent), 0.95);
          }
          put.text(app.label, rx+2, 8, app.accent, 1);
          put.text(app.kind==='iframe' ? 'external program · '+app.src : 'built-in program', rx+2, 9, MID, 0.85);
          // LAUNCH button
          const btn = '  ▶ LAUNCH  ';
          const bx = rx+2;
          const by = 11;
          for(let i=0;i<btn.length;i++) put.put(btn[i], bx+i, by, btn[i]==='▶'?LIM:INK, 1);
          // border above & below
          for(let i=0;i<btn.length;i++){ put.put('─', bx+i, by-1, app.accent, 0.7); put.put('─', bx+i, by+1, app.accent, 0.7); }
          this.hits.push({
            x: bx*cs, y:(by-1)*cs, w: btn.length*cs, h: 3*cs,
            action: ()=>{ spawnWindow(app); },
          });
          // also offer "open in window from FILES" hint
          put.text('return on a row to expand · click LAUNCH to run', rx+2, by+3, MID, 0.55);
        }
      } else if(sel.kind==='file'){
        if(this.previewLoading){
          put.text('loading…', rx+2, 4, CURSOR, 0.9);
        } else {
          const lines = (this.preview||'').split('\n');
          const max = rows - 5;
          for(let i=0;i<Math.min(lines.length, max); i++){
            const ln = lines[i].slice(0, rw-2);
            // markdown-ish coloring
            let col = INK, a = 0.92;
            if(ln.startsWith('# ')) { col = SUN; a = 1; }
            else if(ln.startsWith('## ')) { col = LIM; a = 1; }
            else if(ln.startsWith('### ')) { col = AQU; a = 0.95; }
            else if(/^\s*[-*]\s/.test(ln)){ col = PHERO; }
            else if(/^\s*```/.test(ln)){ col = MID; a = 0.6; }
            else if(/^>/.test(ln)){ col = VIO; a = 0.85; }
            put.text(ln, rx+2, 4+i, col, a);
          }
          if(lines.length > max){
            put.text('… '+(lines.length-max)+' more lines …', rx+2, 4+max, MID, 0.6);
          }
        }
      } else if(sel.kind==='dir'){
        put.text('directory · '+sel.children.length+' items', rx+2, 4, INK, 0.95);
        put.text(sel.open ? '▾ open  (click row again to close)' : '▸ closed (click row to open)', rx+2, 6, MID, 0.8);
      }
    }
  }
  destroy(){}
}

// ─────────────────────────────────────────────────────────────────────────
// BUILT-IN APP: SORTER (live sort visualizer in its own window)
// ─────────────────────────────────────────────────────────────────────────
class Sorter {
  constructor(){
    this.N = 48;
    this.algo = 'bubble';
    this.reset();
    this.compares = 0;
    this.swaps = 0;
    this.tickRate = 1;
    this.algos = ['bubble','insertion','selection','cocktail'];
  }
  reset(){
    this.arr = [];
    for(let i=1;i<=this.N;i++) this.arr.push(i);
    // shuffle
    for(let k=this.arr.length-1;k>0;k--){
      const r = Math.floor(Math.random()*(k+1));
      [this.arr[k], this.arr[r]] = [this.arr[r], this.arr[k]];
    }
    this.i = 0; this.j = 0; this.minI = 0; this.dir = 1;
    this.compares = 0; this.swaps = 0;
    this.done = false;
  }
  setAlgo(name){ this.algo = name; this.reset(); }
  step(){
    if(this.done) return;
    const a = this.arr;
    if(this.algo==='bubble'){
      if(this.j >= a.length - 1 - this.i){ this.j=0; this.i++; if(this.i>=a.length-1){ this.done=true; return; } }
      this.compares++;
      if(a[this.j] > a[this.j+1]){ [a[this.j],a[this.j+1]] = [a[this.j+1],a[this.j]]; this.swaps++; }
      this.j++;
    } else if(this.algo==='insertion'){
      if(this.i===0) this.i = 1;
      if(this.i >= a.length){ this.done=true; return; }
      if(this.j===null) this.j = this.i;
      this.compares++;
      if(this.j>0 && a[this.j-1] > a[this.j]){
        [a[this.j-1], a[this.j]] = [a[this.j], a[this.j-1]];
        this.swaps++;
        this.j--;
      } else {
        this.i++; this.j = this.i;
      }
    } else if(this.algo==='selection'){
      if(this.i >= a.length-1){ this.done=true; return; }
      if(this.j===0 || this.j === undefined) this.j = this.i;
      this.compares++;
      if(a[this.j] < a[this.minI]) this.minI = this.j;
      this.j++;
      if(this.j >= a.length){
        if(this.minI !== this.i){ [a[this.i],a[this.minI]] = [a[this.minI],a[this.i]]; this.swaps++; }
        this.i++; this.j = this.i; this.minI = this.i;
      }
    } else if(this.algo==='cocktail'){
      // simplified
      this.compares++;
      if(this.dir>0){
        if(this.j >= a.length-1 - this.i){ this.dir = -1; this.j -= 1; return; }
        if(a[this.j] > a[this.j+1]){ [a[this.j],a[this.j+1]] = [a[this.j+1],a[this.j]]; this.swaps++; }
        this.j++;
      } else {
        if(this.j <= this.i){ this.dir = 1; this.i++; if(this.i >= a.length-1){ this.done=true; return; } return; }
        if(a[this.j-1] > a[this.j]){ [a[this.j-1],a[this.j]] = [a[this.j],a[this.j-1]]; this.swaps++; }
        this.j--;
      }
    }
  }
  mount(){
    this.win.canvasEl.addEventListener('mousedown', (e)=>this._click(e));
  }
  resize(){}
  _click(e){
    const r = this.win.canvasEl.getBoundingClientRect();
    const x = e.clientX - r.left, y = e.clientY - r.top;
    for(const h of this.hits||[]){
      if(x>=h.x && x<h.x+h.w && y>=h.y && y<h.y+h.h){ h.action(); return; }
    }
  }
  onKey(e){
    if(e.key===' '){ this.reset(); e.preventDefault(); return true; }
    if(e.key==='+' || e.key==='='){ this.tickRate = Math.min(20, this.tickRate+1); return true; }
    if(e.key==='-'){ this.tickRate = Math.max(1, this.tickRate-1); return true; }
    return false;
  }
  draw(){
    for(let s=0; s<this.tickRate; s++) this.step();
    const c = this.win.ctx;
    const W = this.win.pixW, H = this.win.pixH;
    c.fillStyle = BG; c.fillRect(0,0,W,H);
    const cs = Math.max(10, Math.floor(Math.min(W/(this.N+6), H/24)));
    const put = makePut(c, cs);
    const cols = Math.floor(W/cs), rows = Math.floor(H/cs);

    // border
    for(let cc=1;cc<cols-1;cc++){ put.put('═', cc, 0, MID, 0.8); put.put('═', cc, rows-1, MID, 0.8); }
    for(let rr=1;rr<rows-1;rr++){ put.put('║', 0, rr, MID, 0.8); put.put('║', cols-1, rr, MID, 0.8); }
    put.put('╔',0,0,MID,1); put.put('╗',cols-1,0,MID,1); put.put('╚',0,rows-1,MID,1); put.put('╝',cols-1,rows-1,MID,1);

    put.text(' SORT · '+this.algo+' ', 2, 0, AQU, 1);

    // bars area
    const x0 = 3;
    const y0 = 2;
    const barH = rows - 6;
    const maxV = this.N;
    for(let i=0;i<this.arr.length && x0+i<cols-3;i++){
      const v = this.arr[i];
      const h = Math.max(1, Math.floor((v/maxV)*barH));
      // color by value
      const huePos = (v-1) / (maxV-1);
      const col = RAINBOW[Math.floor(huePos*(RAINBOW.length-1))];
      // highlight active indices
      const hot = (i===this.j || i===this.j+1 || i===this.i);
      for(let r=0;r<h;r++){
        const y = y0 + barH - 1 - r;
        const ch = (r === h-1) ? '▔' : (r === 0 ? '▁' : '█');
        put.put(ch, x0+i, y, hot ? CURSOR : col, hot ? 1 : 0.92);
      }
    }

    // controls row
    const cy = rows - 3;
    let cx = 2;
    this.hits = [];
    for(const algo of this.algos){
      const lbl = '['+algo+']';
      const col = algo===this.algo ? CURSOR : MID;
      put.text(lbl, cx, cy, col, algo===this.algo?1:0.85);
      this.hits.push({x:cx*cs, y:cy*cs, w:lbl.length*cs, h:cs, action:()=>this.setAlgo(algo)});
      cx += lbl.length + 1;
    }
    const reset = '[ ↻ shuffle ]';
    put.text(reset, cx, cy, LIM, 0.95);
    this.hits.push({x:cx*cs, y:cy*cs, w:reset.length*cs, h:cs, action:()=>this.reset()});
    // stats
    const stats = 'compares '+this.compares+'  swaps '+this.swaps+'  speed ×'+this.tickRate+(this.done?'  · done':'');
    put.text(stats, 2, rows-2, MID, 0.8);
  }
  destroy(){}
}

function drawCursor(){
  if(mouseC<0||mouseR<0) return;
  // skip cursor when over a window (the OS cursor takes over)
  for(const w of windows){
    const x = w.x, y = w.y, ww = w.w, hh = w.h;
    if(mouseX>=x && mouseX<x+ww && mouseY>=y && mouseY<y+hh) return;
  }
  const ic = iconAt(mouseC, mouseR);
  const onTask = mouseR === rows-1;
  const mark = ic ? '◈' : onTask ? '▔' : '+';
  const col = ic ? ACCENT : HI;
  putBg.put(mark, mouseC, mouseR, col, 0.7+0.3*Math.sin(t*0.2));
}

// BOOT ANIMATION — quick CRT-flash + scrolling boot log on cold start.
// suppressible via localStorage so it only plays the first time per tab session.
// ─────────────────────────────────────────────────────────────────────────
let bootT = 0;
let bootOn = !sessionStorage.getItem('cwos.booted');
const BOOT_LINES = [
  '[    0.000 ] characterworld/os v0.6 — every glyph a pixel',
  '[    0.012 ] mounting / from typeface ROM',
  '[    0.034 ] loading palette: HI ACC SUN VIO PNK AQU ORA SKY LIM PHERO',
  '[    0.061 ] starting wallpaper:mycelium · seeds spawned',
  '[    0.082 ] starting taskbar:sort · 18 bars · forever',
  '[    0.110 ] window manager up',
  '[    0.142 ] start menu loaded',
  '[    0.183 ] /bin/term ready',
  '[    0.220 ] /bin/life — conway initialised',
  '[    0.255 ] CHAR-NET reachable · char://home',
  '[    0.301 ] no password required',
  '[    0.342 ] welcome, visitor.',
];
function drawBoot(){
  if(!bootOn) return;
  bootT++;
  // fade-in flash for first ~10 frames, then scroll log, then fade-out
  ctx.fillStyle = BG; ctx.fillRect(0,0,bg.width,bg.height);
  // crackle background
  for(let r=0;r<rows;r+=2){
    for(let c=0;c<cols;c++){
      if(Math.random()<0.04){
        const ch = '░▒▓·.'[Math.floor(Math.random()*5)];
        putBg.put(ch, c, r, MID, 0.18);
      }
    }
  }
  const totalDur = 130;
  const opacity = bootT < 8 ? bootT/8 : (bootT > totalDur-12 ? Math.max(0,(totalDur-bootT)/12) : 1);
  ctx.globalAlpha = opacity;
  // big banner
  const banner = 'CHARACTERWORLD/OS';
  const bc = Math.floor((cols - banner.length)/2);
  for(let i=0;i<banner.length;i++){
    const col = banner[i]===' '? INK : RAINBOW[(i + Math.floor(bootT/3))%RAINBOW.length];
    putBg.put(banner[i], bc+i, 4, col, 1);
  }
  putBg.text('— every glyph a pixel —', Math.floor((cols-23)/2), 6, MID, 0.85);

  // scrolling boot log
  const logTop = 9;
  const linesShown = Math.min(BOOT_LINES.length, Math.floor((bootT-8)/6));
  for(let i=0;i<linesShown;i++){
    const ln = BOOT_LINES[i];
    const ageF = (bootT - 8 - i*6) / 30;
    const a = Math.min(1, ageF*1.5);
    // colorize first bracket part
    const m = ln.match(/^(\[.*?\])\s*(.*)$/);
    if(m){
      putBg.text(m[1], 4, logTop+i, LIM, 0.85*a);
      putBg.text(' '+m[2], 4+m[1].length, logTop+i, INK, 0.95*a);
    } else putBg.text(ln, 4, logTop+i, INK, 0.95*a);
  }
  // progress bar
  const barW = Math.max(20, Math.min(60, cols-12));
  const barC = Math.floor((cols - barW)/2);
  const barR = logTop + BOOT_LINES.length + 2;
  const fill = Math.min(barW, Math.floor((bootT - 8) * barW / 90));
  for(let i=0;i<barW;i++){
    const filled = i < fill;
    const col = filled ? RAINBOW[(i+Math.floor(bootT/2))%RAINBOW.length] : DIM;
    putBg.put(filled?'█':'░', barC+i, barR, col, 1);
  }
  putBg.text('['+fill+'/'+barW+']', barC+barW+2, barR, MID, 0.85);
  ctx.globalAlpha = 1;
  if(bootT > totalDur){
    bootOn = false;
    try{ sessionStorage.setItem('cwos.booted','1'); }catch(_){}
  }
}

    const life    = spawnWindow(appById('life'),    { x: Math.floor(W*0.55), y: Math.floor(H*0.10), w: lw, h: lh });
    // give Life some time to evolve
    if(life.instance && life.instance.step){ for(let i=0;i<8;i++) life.instance.step(); }
    // re-focus browser so it has the accent ring
    focusWindow(browser);
    // mark global so a screenshot tool can poll
    window.__og_ready = true;
  }, 100);
}

function loop(){
  t++;
  // bg
  ctx.fillStyle = BG; ctx.fillRect(0,0,bg.width,bg.height);
  if(bootOn){
    drawBoot();
    requestAnimationFrame(loop);
    return;
  }
  drawWallpaper();
  for(const ic of icons) drawIcon(ic);
  drawTaskbar();
  drawStartMenu();
  drawCtxMenu();
  drawCursor();

  // built-in window draws
  for(const w of windows){
    if(w.minimized) continue;
    if(w.kind==='builtin' && w.instance && w.instance.draw){
      w.instance.draw();
    }
  }

  requestAnimationFrame(loop);
}
loop();

// open ABOUT once on first visit, as a welcome
const FIRSTRUN_KEY = 'cwos.firstrun.v1';
if(!localStorage.getItem(FIRSTRUN_KEY)){
  setTimeout(()=>{ spawnWindow(appById('about'), {w:520,h:520}); }, 350);
  try{ localStorage.setItem(FIRSTRUN_KEY, '1'); }catch(_){}
}

})();
</script>
