function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
function rnd(n){const x=Math.sin(n*17.17+3.13)*43758.5453;return x-Math.floor(x);}

function flash(m){message=m;messages.push({m,t});if(messages.length>4)messages.shift();}

// ======================================================================
// LAYERS
// ======================================================================
function makeLayer(name){
  const n=artCols*artRows;
  return {
    name:name||('LAYER '+(layers.length+1)),
    visible:true,
    opacity:100,
    blend:0,
    locked:false,
    chars:new Array(n).fill(' '),
    colors:new Uint8Array(n),
    marks:new Uint8Array(n),
    heat:new Float32Array(n)
  };
}
function copyLayer(L,name){
  const d=makeLayer(name||(L.name+' CP'));
  d.visible=L.visible; d.opacity=L.opacity; d.blend=L.blend; d.locked=L.locked;
  d.chars=L.chars.slice();
  d.colors=new Uint8Array(L.colors);
  d.marks=new Uint8Array(L.marks);
  d.heat=new Float32Array(L.heat);
  return d;
}
function activeLayer(){return layers[active];}
function addLayer(name){
  layers.splice(active+1,0,makeLayer(name));
  active++;
  flash('NEW LAYER '+layers[active].name);
}
function removeLayer(){
  if(layers.length<=1){flash('LAST LAYER');return;}
  layers.splice(active,1);
  active=clamp(active,0,layers.length-1);
  flash('LAYER REMOVED');
}
function duplicateLayer(){
  layers.splice(active+1,0,copyLayer(layers[active]));
  active++;
  flash('LAYER DUPLICATED');
}
function moveLayerUp(){
  if(active>=layers.length-1)return;
  [layers[active],layers[active+1]]=[layers[active+1],layers[active]];
  active++;
}
function moveLayerDown(){
  if(active<=0)return;
  [layers[active],layers[active-1]]=[layers[active-1],layers[active]];
  active--;
}
function mergeDown(){
  if(active<=0){flash('NO LAYER BELOW');return;}
  const top=layers[active], bot=layers[active-1];
  for(let i=0;i<top.chars.length;i++){
    if(top.chars[i]!==' '){
      const keep=Math.random()*100<top.opacity;
      if(keep){
        bot.chars[i]=top.chars[i];
        bot.colors[i]=top.colors[i];
        bot.marks[i]=Math.min(8,bot.marks[i]+top.marks[i]);
        bot.heat[i]=Math.max(bot.heat[i],top.heat[i]);
      }
    }
  }
  layers.splice(active,1);
  active--;
  flash('MERGED DOWN');
}
function flatten(){
  if(layers.length<=1)return;
  while(layers.length>1){
    active=layers.length-1;
    mergeDown();
  }
  flash('FLATTENED');
}
function toggleLayerVisible(i){layers[i].visible=!layers[i].visible;}

// Composite layers to a flat view buffer for rendering.
// Returns {chars, colors, alpha, marks} arrays sized artCols*artRows.
let compBuf={chars:null,colors:null,alpha:null,marks:null};
function ensureCompBuf(){
  const n=artCols*artRows;
  if(!compBuf.chars||compBuf.chars.length!==n){
    compBuf.chars=new Array(n);
    compBuf.colors=new Uint8Array(n);
    compBuf.alpha=new Float32Array(n);
    compBuf.marks=new Uint8Array(n);
  }
}
function composite(){
  ensureCompBuf();
  const n=artCols*artRows;
  for(let i=0;i<n;i++){compBuf.chars[i]=' ';compBuf.colors[i]=0;compBuf.alpha[i]=0;compBuf.marks[i]=0;}
  for(let li=0;li<layers.length;li++){
    const L=layers[li];
    if(!L.visible)continue;
    const op=L.opacity/100;
    const blend=L.blend;
    for(let i=0;i<n;i++){
      const ch=L.chars[i];
      if(ch===' '){
        // BEHIND: contributes density via marks? skip
        continue;
      }
      const cc=L.colors[i];
      const mk=L.marks[i];
      const heat=L.heat[i];
      const a=op;
      if(blend===0){ // NORMAL
        compBuf.chars[i]=ch;
        compBuf.colors[i]=cc;
        compBuf.alpha[i]=clamp(a+compBuf.alpha[i]*(1-a),0,1);
        compBuf.marks[i]=Math.max(compBuf.marks[i],mk);
      }else if(blend===1){ // SCREEN: color shifts brighter among palette neighbors
        compBuf.chars[i]=ch;
        compBuf.colors[i]=brightenIdx(cc);
        compBuf.alpha[i]=clamp(a+compBuf.alpha[i]*(1-a),0,1);
        compBuf.marks[i]=Math.max(compBuf.marks[i],mk);
      }else if(blend===2){ // MULTIPLY: color shifts darker
        compBuf.chars[i]=ch;
        compBuf.colors[i]=darkenIdx(cc);
        compBuf.alpha[i]=clamp(a*0.92+compBuf.alpha[i]*(1-a),0,1);
        compBuf.marks[i]=Math.max(compBuf.marks[i],mk);
      }else if(blend===3){ // STACK: keep lower char if exists, add marks
        if(compBuf.chars[i]===' '){
          compBuf.chars[i]=ch;
          compBuf.colors[i]=cc;
          compBuf.alpha[i]=a;
        }
        compBuf.marks[i]=Math.min(8,compBuf.marks[i]+mk+1);
      }else if(blend===4){ // CORRUPT: mark-only contribution + color shift
        if(compBuf.chars[i]!==' '){
          compBuf.marks[i]=Math.min(8,compBuf.marks[i]+mk+2);
          compBuf.colors[i]=mixIdx(compBuf.colors[i],cc);
        }else{
          compBuf.chars[i]=ch;
          compBuf.colors[i]=cc;
          compBuf.alpha[i]=a*0.7;
          compBuf.marks[i]=Math.min(8,mk+2);
        }
      }else if(blend===5){ // BEHIND: only show where nothing below
        if(compBuf.chars[i]===' '){
          compBuf.chars[i]=ch;
          compBuf.colors[i]=cc;
          compBuf.alpha[i]=a;
          compBuf.marks[i]=mk;
        }
      }
      if(heat>0.05&&compBuf.alpha[i]<1)compBuf.alpha[i]=clamp(compBuf.alpha[i]+heat*0.2,0,1);
    }
  }
}

function paletteRgb(i){const h=COLORS[i][1];return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}
function lum(i){const r=paletteRgb(i);return 0.2126*r[0]+0.7152*r[1]+0.0722*r[2];}
function brightenIdx(i){
  const l=lum(i);
  let best=i, bestD=Infinity;
  for(let j=0;j<COLORS.length;j++){
    const d=lum(j)-l;
    if(d>5&&d<bestD){bestD=d;best=j;}
  }
  return best;
}
function darkenIdx(i){
  const l=lum(i);
  let best=i, bestD=Infinity;
  for(let j=0;j<COLORS.length;j++){
    const d=l-lum(j);
    if(d>5&&d<bestD){bestD=d;best=j;}
  }
  return best;
}
function mixIdx(a,b){
  const ra=paletteRgb(a), rb=paletteRgb(b);
  return nearestColor((ra[0]+rb[0])/2,(ra[1]+rb[1])/2,(ra[2]+rb[2])/2);
}

// ======================================================================
// HISTORY
// ======================================================================
function snapshot(label){
  return {
    label:label||'EDIT',
    active,
    layers:layers.map(L=>({
      name:L.name,visible:L.visible,opacity:L.opacity,blend:L.blend,locked:L.locked,
      chars:L.chars.slice(), colors:Array.from(L.colors), marks:Array.from(L.marks)
    })),
    selection:selection?{w:selection.w,h:selection.h,x:selection.x,y:selection.y,mask:Array.from(selection.mask)}:null,
    artCols, artRows
  };
}
function restore(s){
  if(!s)return;
  artCols=s.artCols; artRows=s.artRows;
  layers=s.layers.map(L=>{
    const n=artCols*artRows;
    const d={name:L.name,visible:L.visible,opacity:L.opacity,blend:L.blend,locked:L.locked,
      chars:new Array(n).fill(' '),
      colors:new Uint8Array(n),
      marks:new Uint8Array(n),
      heat:new Float32Array(n)};
    const m=Math.min(n,L.chars.length);
    for(let i=0;i<m;i++){d.chars[i]=L.chars[i]||' '; d.colors[i]=L.colors[i]||0; d.marks[i]=L.marks[i]||0;}
    return d;
  });
  active=clamp(s.active,0,layers.length-1);
  if(s.selection){
    const sel={x:s.selection.x,y:s.selection.y,w:s.selection.w,h:s.selection.h,mask:new Uint8Array(s.selection.mask)};
    selection=sel;
  }else selection=null;
}
function pushHistory(label){
  history.push(snapshot(label));
  if(history.length>HIST_MAX)history.shift();
  future.length=0;
}
function undo(){
  if(!history.length){flash('NO UNDO');return;}
  future.push(snapshot('REDO'));
  restore(history.pop());
  flash('UNDO');
}
function redo(){
  if(!future.length){flash('NO REDO');return;}
  history.push(snapshot('UNDO'));
  restore(future.pop());
  flash('REDO');
}

// ======================================================================
// SELECTION
// ======================================================================
function selectAll(){
  const n=artCols*artRows;
  selection={x:0,y:0,w:artCols,h:artRows,mask:new Uint8Array(n).fill(1)};
  flash('SELECT ALL');
}
function deselect(){selection=null;flash('DESELECTED');}
function invertSelection(){
  if(!selection){selectAll();return;}
  for(let i=0;i<selection.mask.length;i++)selection.mask[i]=selection.mask[i]?0:1;
  flash('INVERT SELECTION');
}
function inSel(x,y){
  if(!selection)return true;
  if(x<0||y<0||x>=artCols||y>=artRows)return false;
  return selection.mask[y*artCols+x]===1;
}
function selectRect(x0,y0,x1,y1,additive){
  const xa=Math.max(0,Math.min(x0,x1)), ya=Math.max(0,Math.min(y0,y1));
  const xb=Math.min(artCols-1,Math.max(x0,x1)), yb=Math.min(artRows-1,Math.max(y0,y1));
  const n=artCols*artRows;
  const mask=additive&&selection?new Uint8Array(selection.mask):new Uint8Array(n);
  for(let y=ya;y<=yb;y++)for(let x=xa;x<=xb;x++)mask[y*artCols+x]=1;
  selection={x:0,y:0,w:artCols,h:artRows,mask};
}
function selectLasso(path,additive){
  if(!path||path.length<3)return;
  const n=artCols*artRows;
  const mask=additive&&selection?new Uint8Array(selection.mask):new Uint8Array(n);
  for(let y=0;y<artRows;y++)for(let x=0;x<artCols;x++){
    let inside=false;
    for(let i=0,j=path.length-1;i<path.length;j=i++){
      const xi=path[i][0]+0.5, yi=path[i][1]+0.5;
      const xj=path[j][0]+0.5, yj=path[j][1]+0.5;
      const inter=((yi>y+0.5)!==(yj>y+0.5))&&(x+0.5<(xj-xi)*(y+0.5-yi)/(yj-yi+1e-9)+xi);
      if(inter)inside=!inside;
    }
    if(inside)mask[y*artCols+x]=1;
  }
  selection={x:0,y:0,w:artCols,h:artRows,mask};
}
function selectMagic(x,y,additive){
  const L=activeLayer();
  const p0=idx(x,y);
  const tCh=L.chars[p0], tCol=L.colors[p0];
  const n=artCols*artRows;
  const mask=additive&&selection?new Uint8Array(selection.mask):new Uint8Array(n);
  const seen=new Uint8Array(n);
  const stack=[[x,y]];
  while(stack.length){
    const p=stack.pop(), px=p[0], py=p[1];
    if(px<0||py<0||px>=artCols||py>=artRows)continue;
    const q=py*artCols+px;
    if(seen[q])continue;
    if(L.chars[q]!==tCh||L.colors[q]!==tCol)continue;
    seen[q]=1; mask[q]=1;
    stack.push([px+1,py],[px-1,py],[px,py+1],[px,py-1]);
  }
  selection={x:0,y:0,w:artCols,h:artRows,mask};
}

// ======================================================================
// CLIPBOARD
// ======================================================================
function copySelection(cut){
  if(!selection){flash('NO SELECTION');return;}
  const L=activeLayer();
  let minX=artCols,minY=artRows,maxX=-1,maxY=-1;
  for(let y=0;y<artRows;y++)for(let x=0;x<artCols;x++){
    if(selection.mask[y*artCols+x]){
      if(x<minX)minX=x; if(x>maxX)maxX=x;
      if(y<minY)minY=y; if(y>maxY)maxY=y;
    }
  }
  if(maxX<0){flash('EMPTY SELECTION');return;}
  const w=maxX-minX+1, h=maxY-minY+1;
  const clip={w,h,chars:new Array(w*h).fill(' '),colors:new Uint8Array(w*h),marks:new Uint8Array(w*h),mask:new Uint8Array(w*h)};
  for(let y=0;y<h;y++)for(let x=0;x<w;x++){
    const sx=minX+x, sy=minY+y;
    if(selection.mask[sy*artCols+sx]){
      const sp=idx(sx,sy), dp=y*w+x;
      clip.chars[dp]=L.chars[sp];
      clip.colors[dp]=L.colors[sp];
      clip.marks[dp]=L.marks[sp];
      clip.mask[dp]=1;
      if(cut){L.chars[sp]=' '; L.colors[sp]=0; L.marks[sp]=0; L.heat[sp]=0;}
    }
  }
  clipboard=clip;
  flash(cut?'CUT':'COPY');
}
function paste(){
  if(!clipboard){flash('CLIPBOARD EMPTY');return;}
  pushHistory('PASTE');
  const L=activeLayer();
  const ox=Math.max(0,Math.floor((artCols-clipboard.w)/2));
  const oy=Math.max(0,Math.floor((artRows-clipboard.h)/2));
  const n=artCols*artRows;
  const mask=new Uint8Array(n);
  for(let y=0;y<clipboard.h;y++)for(let x=0;x<clipboard.w;x++){
    const sp=y*clipboard.w+x;
    if(!clipboard.mask[sp])continue;
    const dx=ox+x, dy=oy+y;
    if(dx<0||dy<0||dx>=artCols||dy>=artRows)continue;
    const dp=idx(dx,dy);
    L.chars[dp]=clipboard.chars[sp];
    L.colors[dp]=clipboard.colors[sp];
    L.marks[dp]=clipboard.marks[sp];
    L.heat[dp]=0.7;
    mask[dp]=1;
  }
  selection={x:0,y:0,w:artCols,h:artRows,mask};
  flash('PASTED');
}

// ======================================================================
// RESIZE / LAYOUT
// ======================================================================
function setFont(px,target){
  const f=px+'px "Courier New", Courier, monospace';
  if(target){target.font=f;target.textBaseline='top';target.textAlign='left';return;}
  if(currentFont!==f){ctx.font=f;currentFont=f;}
  ctx.textBaseline='top';
  ctx.textAlign='left';
}
function resize(){
  dpr=Math.max(1,Math.min(2,window.devicePixelRatio||1));
  W=window.innerWidth; H=window.innerHeight;
  canvas.width=Math.floor(W*dpr); canvas.height=Math.floor(H*dpr);
  canvas.style.width=W+'px'; canvas.style.height=H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  uiCell=H<680?13:(H<900?15:16);
  uiCw=uiCell*0.62;
  uiCh=uiCell*1.08;
  uiCols=Math.floor(W/uiCw);
  uiRows=Math.floor(H/uiCh);
  artCellBase=clamp(pixelSize,3,12);
  artCell=Math.max(3,Math.round(artCellBase*zoom));
  artCw=artCell*0.58;
  artCh=artCell*1.02;
  layout();
}
function layout(){
  const compact=uiCols<90;
  const sideW=compact?0:18;
  const topRows=compact?8:4;
  const bottomRows=2;
  const leftRail=compact?0:4;
  const canvasLeft=leftRail+sideW;
  const canvasRight=uiCols-(compact?0:18);
  const canvasTop=topRows;
  const canvasBottom=uiRows-bottomRows;
  artPxX=(canvasLeft+1)*uiCw;
  artPxY=(canvasTop+1)*uiCh;
  artPxW=Math.max(32,(canvasRight-canvasLeft-2)*uiCw);
  artPxH=Math.max(32,(canvasBottom-canvasTop-1)*uiCh);
  viewCols=Math.max(8,Math.floor(artPxW/artCw));
  viewRows=Math.max(8,Math.floor(artPxH/artCh));
  // ensure art size has been allocated
  if(!layers.length){
    artCols=Math.max(80,viewCols);
    artRows=Math.max(40,viewRows);
    layers=[makeLayer('BASE')];
    seed();
  }
  // clamp pan so view stays near canvas
  const maxPanX=Math.max(0,artCols-viewCols);
  const maxPanY=Math.max(0,artRows-viewRows);
  panX=clamp(panX,-4,maxPanX+4);
  panY=clamp(panY,-4,maxPanY+4);
}
function seed(){
  const L=layers[0];
  const words=['C','H','A','R','A','C','T','E','R','W','O','R','L','D'];
  const cy=Math.floor(artRows*0.5), sx=Math.max(1,Math.floor((artCols-words.length)/2));
  for(let i=0;i<words.length;i++){
    const p=idx(sx+i,cy);
    L.chars[p]=words[i]; L.colors[p]=i%COLORS.length; L.heat[p]=0.4; L.marks[p]=i%3;
  }
  for(let i=0;i<40;i++){
    const x=Math.floor(rnd(i+1)*artCols), y=Math.floor(rnd(i+9)*artRows);
    const p=idx(x,y);
    L.chars[p]=GLYPHS[Math.floor(rnd(i+17)*GLYPHS.length)];
    L.colors[p]=Math.floor(rnd(i+23)*COLORS.length);
    L.marks[p]=Math.floor(rnd(i+31)*4);
  }
}
function resizeCanvasTo(newW,newH){
  newW=clamp(Math.round(newW),16,600);
  newH=clamp(Math.round(newH),12,400);
  const old={w:artCols,h:artRows,layers:layers.map(L=>copyLayer(L,L.name))};
  artCols=newW; artRows=newH;
  layers=old.layers.map(OL=>{
    const d=makeLayer(OL.name);
    d.visible=OL.visible; d.opacity=OL.opacity; d.blend=OL.blend; d.locked=OL.locked;
    const mw=Math.min(old.w,artCols), mh=Math.min(old.h,artRows);
    for(let y=0;y<mh;y++)for(let x=0;x<mw;x++){
      const a=y*artCols+x, b=y*old.w+x;
      d.chars[a]=OL.chars[b]||' ';
      d.colors[a]=OL.colors[b]||0;
      d.marks[a]=OL.marks[b]||0;
      d.heat[a]=OL.heat[b]||0;
    }
    return d;
  });
  selection=null;
  flash('CANVAS '+artCols+'x'+artRows);
  layout();
}

// ======================================================================
// DRAWING PRIMITIVES
// ======================================================================
function text(s,c,r,col,alpha){
  if(r<0||r>=uiRows)return;
  setFont(uiCell);
  ctx.globalAlpha=alpha==null?1:alpha;
  ctx.fillStyle=col||TH.text;
  ctx.fillText(s,c*uiCw,r*uiCh);
  ctx.globalAlpha=1;
}
function gridGlyph(s,gridX,gridY,col,alpha,target,ox,oy){
  const xx=(gridX-panX)*artCw + (ox==null?artPxX:ox);
  const yy=(gridY-panY)*artCh + (oy==null?artPxY:oy);
  if(gridX<panX-1||gridY<panY-1||gridX>panX+viewCols||gridY>panY+viewRows){
    if(!target)return;
  }
  const g=target||ctx;
  if(!target)setFont(artCell);
  else setFont(artCell,g);
  g.globalAlpha=alpha==null?1:alpha;
  g.fillStyle=col||TH.text;
  g.fillText(s,xx,yy);
  g.globalAlpha=1;
}
function button(id,label,c,r,w,active,col,data){
  const s=(active?'▸':'[')+label+(active?'◂':']');
  const ww=Math.max(w||s.length,s.length);
  buttons.push({id,c,r,w:ww,h:1,data:data||null});
  text(s,c,r,active?(col||TH.accent):TH.text,active?1:0.85);
}
function plainButton(id,label,c,r,w,col,alpha,data){
  buttons.push({id,c,r,w:w||label.length,h:1,data:data||null});
  text(label,c,r,col||TH.text,alpha==null?0.9:alpha);
}
function frame(c,r,w,h,title,col){
  const cc=col||TH.hint;
  if(w<3||h<2)return;
  let top='╭'+'─'.repeat(w-2)+'╮';
  text(top,c,r,cc,0.85);
  for(let y=1;y<h-1;y++){
    text('│',c,r+y,cc,0.55);
    text('│',c+w-1,r+y,cc,0.55);
  }
  text('╰'+'─'.repeat(w-2)+'╯',c,r+h-1,cc,0.85);
  if(title){
    const tt=' '+title+' ';
    text(tt,c+2,r,TH.text,0.95);
  }
}
function divider(c,r,w,ch,col,alpha){
  text((ch||'─').repeat(Math.max(0,w)),c,r,col||TH.hint,alpha==null?0.5:alpha);
}

// ======================================================================
// DECORATED GLYPH
// ======================================================================
function decorated(base,m,phase){
  if(base===' '||!m)return base;
  let s=base;
  const count=Math.min(6,m);
  const ph=phase==null?t:phase;
  for(let i=0;i<count;i++){
    const pick=(base.charCodeAt(0)+i*7+m*13+ph)%3;
    if(pick===0)s+=ABOVE[(i+m+ph)%ABOVE.length];
    else if(pick===1)s+=BELOW[(i*2+m+ph)%BELOW.length];
    else s+=STRIKE[(i+m)%STRIKE.length];
  }
  return s;
}

function panelGlyphs(x,y,w){

  y++;

  const cols=Math.max(6,Math.floor(w/2));

  let k=0;
  for(let r=0;r<maxRows;r++){

      text(sel?'▸'+g:' '+g,x+cc*2,y,sel?TH.accent:TH.text,sel?1:0.78);

    y++;

function meterRow(id,label,v,lo,hi,x,y,w,col){
  const span=hi-lo;
  const pos=v-lo;
  let s=label+' ';

  s+=' '+String(v).padStart(2,'0');
  buttons.push({id:id+':down',c:x,r:y,w:label.length+1,h:1});
  buttons.push({id:id+':up',c:x+label.length+1,r:y,w:w-label.length-1,h:1});
  text(s.slice(0,w),x,y,col||TH.text,0.95);
}
function signedMeterRow(id,label,v,lo,hi,x,y,w,col){
  const span=hi-lo, zero=-lo, pos=v-lo;
  let s=label+' ';
  for(let i=0;i<=span;i++)s+=i===pos?'█':(i===zero?'│':'░');
  s+=' '+(v>0?'+':'')+v;
  buttons.push({id:id+':down',c:x,r:y,w:label.length+1,h:1});
  buttons.push({id:id+':up',c:x+label.length+1,r:y,w:w-label.length-1,h:1});

function drawComposite(){
  composite();

  for(let vy=0;vy<viewRows;vy++){
    const gy2=vy+panY;
    if(gy2<0||gy2>=artRows)continue;
    let run='', runColor=-1, start=0, alpha=0;
    for(let vx=0;vx<viewCols;vx++){
      const gx2=vx+panX;
      let ch=' ', col=-1, a=0, mk=0;
      if(gx2>=0&&gx2<artCols){
        const p=gy2*artCols+gx2;
        ch=compBuf.chars[p];
        col=compBuf.chars[p]===' '?-1:compBuf.colors[p];
        a=compBuf.alpha[p];
        mk=compBuf.marks[p];
      }
      const rendered=ch===' '?' ':decorated(ch,mk,t);
      if(vx===0){run=rendered;runColor=col;start=vx;alpha=a;continue;}
      if(col===runColor&&Math.abs(a-alpha)<0.06){run+=rendered;}
      else{
        if(runColor>=0&&alpha>0.02){
          ctx.globalAlpha=clamp(0.55+alpha*0.55,0.55,1);
          ctx.fillStyle=COLORS[runColor][1];
          ctx.fillText(run,artPxX+start*artCw,artPxY+vy*artCh);
        }
        run=rendered;runColor=col;start=vx;alpha=a;
      }
    }
    if(runColor>=0&&alpha>0.02){
      ctx.globalAlpha=clamp(0.55+alpha*0.55,0.55,1);
      ctx.fillStyle=COLORS[runColor][1];
      ctx.fillText(run,artPxX+start*artCw,artPxY+vy*artCh);

  }

function drawSelection(){
  if(!selection)return;
  setFont(artCell);
  // marching ants: show '·' '∙' alternating per t
  const phase=Math.floor(t/4)%2;
  ctx.fillStyle=TH.accent;
  ctx.globalAlpha=0.85;
  const chars=phase?'·':'∙';
  // draw perimeter cells: a cell is a perimeter if selected and any neighbor is not selected
  for(let vy=0;vy<viewRows;vy++){
    const gy2=vy+panY; if(gy2<0||gy2>=artRows)continue;
    for(let vx=0;vx<viewCols;vx++){
      const gx2=vx+panX; if(gx2<0||gx2>=artCols)continue;
      const p=gy2*artCols+gx2;
      if(!selection.mask[p])continue;
      const nb=[[-1,0],[1,0],[0,-1],[0,1]];
      let border=false;
      for(const d of nb){
        const nx=gx2+d[0], ny=gy2+d[1];
        if(nx<0||ny<0||nx>=artCols||ny>=artRows){border=true;break;}
        if(!selection.mask[ny*artCols+nx]){border=true;break;}
      }
      if(!border)continue;
      const parity=(gx2+gy2+phase)&1;
      if(parity)ctx.fillText('╳',artPxX+vx*artCw,artPxY+vy*artCh);
      else ctx.fillText('┼',artPxX+vx*artCw,artPxY+vy*artCh);
    }
  }
  ctx.globalAlpha=1;
}

// TOOLS / PAINTING
// ======================================================================
function brushShapeCells(cx,cy){
  const cells=[];
  const sh=BRUSH_PRESETS[0].shape; // round for now
  for(let yy=-size;yy<=size;yy++)for(let xx=-size;xx<=size;xx++){
    if(xx*xx+yy*yy>size*size+0.3)continue;
    cells.push([cx+xx,cy+yy,cx-xx,cy-yy]);
  }
  return cells;
}

function applyCell(x,y,sx,sy){
  if(x<0||y<0||x>=artCols||y>=artRows)return;
  if(!inSel(x,y))return;
  const L=activeLayer();
  if(L.locked)return;
  const p=idx(x,y);
  const force=strength/9;
  // ERASE
  if(mode===2){
    L.heat[p]*=(1-force);
    if(force>0.7||rnd(p+t)<force){L.chars[p]=' '; L.colors[p]=0; L.marks[p]=0;}
    return;
  }
  // For probability-based brushes, gate by strength
  if(mode!==1&&mode!==10&&mode!==11&&mode!==12&&rnd((x+1)*97+(y+1)*193+t*0.37)>force)return;
  // BRUSH
  if(mode===0){
    L.chars[p]=GLYPHS[(glyph+Math.floor(rnd(x*31+y*17+t)*3))%GLYPHS.length];
    L.colors[p]=color; L.heat[p]=force; L.marks[p]=Math.floor(rnd(x*23+y*29+t)*Math.ceil(force*4));
    return;
  }
  // PENCIL (deterministic)
  if(mode===1){
    L.chars[p]=GLYPHS[glyph];
    L.colors[p]=color; L.heat[p]=force; L.marks[p]=0;
    return;
  }
  // SMEAR
  if(mode===4){
    const ssx=clamp(sx,0,artCols-1), ssy=clamp(sy,0,artRows-1);
    const q=idx(ssx,ssy);
    L.chars[p]=L.chars[q]===' '?GLYPHS[glyph]:L.chars[q];
    L.colors[p]=L.colors[q]||color; L.heat[p]=force; L.marks[p]=L.marks[q];
    return;
  }
  // CORRUPT
  if(mode===5){
    if(L.chars[p]===' ')L.chars[p]=GLYPHS[(glyph+x+y+t)%GLYPHS.length];
    L.colors[p]=color; L.heat[p]=force; L.marks[p]=clamp(L.marks[p]+Math.ceil(force*3),1,8);
    return;
  }
  // BLOOM
  if(mode===6){
    L.chars[p]=GLYPHS[(glyph+x*11+y*17+t)%GLYPHS.length];
    L.colors[p]=(color+x+y)%COLORS.length; L.heat[p]=force; L.marks[p]=Math.ceil(((x+y+t)%5)*force);
    return;
  }
  // DODGE: brighten
  if(mode===18){
    if(L.chars[p]!==' '){
      L.colors[p]=brightenIdx(L.colors[p]);
      L.heat[p]=Math.min(1,L.heat[p]+force*0.3);
      L.marks[p]=Math.max(0,L.marks[p]-1);
    }else{
      L.chars[p]=DENSITY[DENSITY.length-1-Math.floor(rnd(p+t)*3)];
      L.colors[p]=color; L.heat[p]=force;
    }
    return;
  }
  // BURN: darken
  if(mode===19){
    if(L.chars[p]!==' '){
      L.colors[p]=darkenIdx(L.colors[p]);
      L.marks[p]=Math.min(8,L.marks[p]+Math.ceil(force*2));
    }
    return;
  }
  // CLONE
  if(mode===17&&cloneSource&&cloneOffset){
    const srcX=x-cloneOffset[0], srcY=y-cloneOffset[1];
    if(srcX>=0&&srcY>=0&&srcX<artCols&&srcY<artRows){
      const q=idx(srcX,srcY);
      if(L.chars[q]!==' '){
        L.chars[p]=L.chars[q];
        L.colors[p]=L.colors[q];
        L.marks[p]=L.marks[q];
        L.heat[p]=force;
      }
    }
    return;
  }
  // default brush
  L.chars[p]=GLYPHS[glyph];
  L.colors[p]=color; L.heat[p]=force; L.marks[p]=0;
}

function paintAt(x,y){
  const cells=brushShapeCells(x,y);
  for(const c of cells){
    applyCell(c[0],c[1],c[2],c[3]);
    if(mirror||mode===20){
      applyCell(artCols-1-c[0],c[1],artCols-1-c[2],c[3]);
      applyCell(c[0],artRows-1-c[1],c[2],artRows-1-c[3]);
      applyCell(artCols-1-c[0],artRows-1-c[1],artCols-1-c[2],artRows-1-c[3]);
    }
  }
}

function paintLine(x0,y0,x1,y1){
  if(x0<0||y0<0){paintAt(x1,y1);return;}
  const dx=x1-x0, dy=y1-y0, n=Math.max(Math.abs(dx),Math.abs(dy),1);
  for(let i=0;i<=n;i++)paintAt(Math.round(x0+dx*i/n),Math.round(y0+dy*i/n));
}

function shapeCells(x0,y0,x1,y1,kind){
  const cells=[];
  x0=clamp(x0,0,artCols-1); y0=clamp(y0,0,artRows-1);
  x1=clamp(x1,0,artCols-1); y1=clamp(y1,0,artRows-1);
  if(kind==='line'){
    const dx=x1-x0, dy=y1-y0, n=Math.max(Math.abs(dx),Math.abs(dy),1);
    for(let i=0;i<=n;i++)cells.push([Math.round(x0+dx*i/n),Math.round(y0+dy*i/n)]);
    return cells;
  }
  const l=Math.min(x0,x1), r=Math.max(x0,x1), top=Math.min(y0,y1), bot=Math.max(y0,y1);
  if(kind==='box'){
    for(let x=l;x<=r;x++){cells.push([x,top]);cells.push([x,bot]);}
    for(let y=top;y<=bot;y++){cells.push([l,y]);cells.push([r,y]);}
    return cells;
  }
  const cxc=(l+r)/2, cyc=(top+bot)/2, rx=Math.max(1,(r-l)/2), ry=Math.max(1,(bot-top)/2);
  for(let y=top;y<=bot;y++)for(let x=l;x<=r;x++){
    const d=Math.abs(((x-cxc)*(x-cxc))/(rx*rx)+((y-cyc)*(y-cyc))/(ry*ry)-1);
    if(d<0.18||rx<2||ry<2)cells.push([x,y]);
  }
  return cells;
}
function commitShape(kind,x0,y0,x1,y1){
  const cells=shapeCells(x0,y0,x1,y1,kind);
  for(const p of cells){
    for(let yy=-Math.floor(size/2);yy<=Math.floor(size/2);yy++)for(let xx=-Math.floor(size/2);xx<=Math.floor(size/2);xx++){
      if(xx*xx+yy*yy>Math.max(1,Math.floor(size/2))*Math.max(1,Math.floor(size/2))+0.2)continue;
      applyCell(p[0]+xx,p[1]+yy,p[0]-xx,p[1]-yy);
      if(mirror){
        applyCell(artCols-1-(p[0]+xx),p[1]+yy,artCols-1-(p[0]-xx),p[1]-yy);
        applyCell(p[0]+xx,artRows-1-(p[1]+yy),p[0]-xx,artRows-1-(p[1]-yy));
        applyCell(artCols-1-(p[0]+xx),artRows-1-(p[1]+yy),artCols-1-(p[0]-xx),artRows-1-(p[1]-yy));
      }
    }
  }
}

function fillArea(x,y){
  if(x<0||y<0||x>=artCols||y>=artRows)return;
  const L=activeLayer();
  if(L.locked)return;
  const start=idx(x,y), targetChar=L.chars[start], targetColor=L.colors[start];
  const seen=new Uint8Array(artCols*artRows);
  const stack=[[x,y]];
  let count=0, limit=artCols*artRows;
  while(stack.length&&count<limit){
    const p=stack.pop(), px=p[0], py=p[1], n=idx(px,py);
    if(px<0||py<0||px>=artCols||py>=artRows||seen[n])continue;
    if(L.chars[n]!==targetChar||L.colors[n]!==targetColor)continue;
    if(!inSel(px,py))continue;
    seen[n]=1; count++;
    L.chars[n]=GLYPHS[glyph]; L.colors[n]=color; L.heat[n]=0.6; L.marks[n]=0;
    stack.push([px+1,py],[px-1,py],[px,py+1],[px,py-1]);
  }
  flash('FILL '+count);
}

function gradientFill(x0,y0,x1,y1){
  const L=activeLayer();
  if(L.locked)return;
  const dx=x1-x0, dy=y1-y0, len=Math.max(1,Math.hypot(dx,dy));
  const fg=color, bg=color2;
  const fgRgb=paletteRgb(fg), bgRgb=paletteRgb(bg);
  const ramp=[' ','·','∙','░','▒','▓','█'];
  let count=0;
  const xa=Math.min(x0,x1), xb=Math.max(x0,x1), ya=Math.min(y0,y1), yb=Math.max(y0,y1);
  for(let y=ya;y<=yb;y++)for(let x=xa;x<=xb;x++){
    if(!inSel(x,y))continue;
    const proj=((x-x0)*dx+(y-y0)*dy)/(len*len);
    const tt=clamp(proj,0,1);
    const r=fgRgb[0]*(1-tt)+bgRgb[0]*tt;
    const g=fgRgb[1]*(1-tt)+bgRgb[1]*tt;
    const b=fgRgb[2]*(1-tt)+bgRgb[2]*tt;
    const p=idx(x,y);
    L.chars[p]=ramp[Math.floor(tt*(ramp.length-1))]===' '?GLYPHS[glyph]:ramp[Math.floor(tt*(ramp.length-1))];
    L.colors[p]=nearestColor(r,g,b);
    L.heat[p]=0.6;
    count++;
  }
  flash('GRADIENT '+count);
}

function placeType(anchor,str){
  const L=activeLayer();
  if(L.locked){flash('LAYER LOCKED');return;}
  let x=anchor[0], y=anchor[1];
  for(const ch of str){
    if(ch==='\n'){y++; x=anchor[0]; continue;}
    if(x<0||y<0||x>=artCols||y>=artRows){x++;continue;}
    if(!inSel(x,y)){x++;continue;}
    const p=idx(x,y);
    L.chars[p]=ch; L.colors[p]=color; L.heat[p]=0.7; L.marks[p]=0;
    x++;
  }
}

function forEachSel(cb){
  const L=activeLayer();
  for(let y=0;y<artRows;y++)for(let x=0;x<artCols;x++){
    if(!inSel(x,y))continue;
    cb(L,x,y,idx(x,y));
  }
}
function filterInvert(){
  pushHistory('INVERT');
  forEachSel((L,x,y,p)=>{ if(L.chars[p]===' ')return; L.colors[p]=(L.colors[p]+16)%COLORS.length; });
  flash('INVERTED');
}
function filterZalgo(amt){
  pushHistory('ZALGO');
  forEachSel((L,x,y,p)=>{ if(L.chars[p]===' ')return; L.marks[p]=clamp((L.marks[p]||0)+Math.ceil((amt||2)),0,8); });
  flash('ZALGO');
}
function filterNoise(){
  pushHistory('NOISE');
  forEachSel((L,x,y,p)=>{
    if(rnd(p*3+t)<0.2){
      L.chars[p]=GLYPHS[Math.floor(rnd(p+t*0.1)*GLYPHS.length)];
      L.colors[p]=Math.floor(rnd(p+t*0.3)*COLORS.length);
      L.heat[p]=0.5;
    }
  });
  flash('NOISE');
}
function filterPixelate(){
  pushHistory('PIXELATE');
  const L=activeLayer();
  const bs=2;
  for(let y=0;y<artRows;y+=bs)for(let x=0;x<artCols;x+=bs){
    if(!inSel(x,y))continue;
    const p=idx(x,y);
    const ch=L.chars[p], col=L.colors[p], mk=L.marks[p];
    for(let yy=0;yy<bs;yy++)for(let xx=0;xx<bs;xx++){
      const nx=x+xx, ny=y+yy;
      if(nx>=artCols||ny>=artRows)continue;
      if(!inSel(nx,ny))continue;
      const q=idx(nx,ny);
      L.chars[q]=ch; L.colors[q]=col; L.marks[q]=mk;
    }
  }
  flash('PIXELATED');
}
function filterBlur(){
  pushHistory('BLUR');
  const L=activeLayer();
  const newChars=L.chars.slice();
  const newCols=new Uint8Array(L.colors);
  for(let y=1;y<artRows-1;y++)for(let x=1;x<artCols-1;x++){
    if(!inSel(x,y))continue;
    const n=[idx(x-1,y),idx(x+1,y),idx(x,y-1),idx(x,y+1),idx(x,y)];
    const counts={};
    for(const q of n){
      const c=L.chars[q];
      counts[c]=(counts[c]||0)+1;
    }
    let bestChar=' ', bestN=0;
    for(const k in counts) if(counts[k]>bestN){bestN=counts[k];bestChar=k;}
    newChars[idx(x,y)]=bestChar;
    // avg color
    let r=0,g=0,b=0,c=0;
    for(const q of n){
      if(L.chars[q]===' ')continue;
      const rgb=paletteRgb(L.colors[q]);
      r+=rgb[0];g+=rgb[1];b+=rgb[2];c++;
    }
    if(c>0)newCols[idx(x,y)]=nearestColor(r/c,g/c,b/c);
  }
  L.chars=newChars; L.colors=newCols;
  flash('BLURRED');
}
function filterSharpen(){
  pushHistory('SHARPEN');
  const L=activeLayer();
  const newCols=new Uint8Array(L.colors);
  for(let y=1;y<artRows-1;y++)for(let x=1;x<artCols-1;x++){
    if(!inSel(x,y))continue;
    const p=idx(x,y);
    if(L.chars[p]===' ')continue;
    const c=paletteRgb(L.colors[p]);
    const nb=[idx(x-1,y),idx(x+1,y),idx(x,y-1),idx(x,y+1)];
    let ar=0,ag=0,ab=0,n=0;
    for(const q of nb){
      if(L.chars[q]===' ')continue;
      const rgb=paletteRgb(L.colors[q]);
      ar+=rgb[0];ag+=rgb[1];ab+=rgb[2];n++;
    }
    if(n===0)continue;
    ar/=n;ag/=n;ab/=n;
    const r=clamp(c[0]+(c[0]-ar)*0.7,0,255);
    const g=clamp(c[1]+(c[1]-ag)*0.7,0,255);
    const b=clamp(c[2]+(c[2]-ab)*0.7,0,255);
    newCols[p]=nearestColor(r,g,b);
  }
  L.colors=newCols;
  flash('SHARPENED');
}
function filterEdge(){
  pushHistory('EDGE');
  const L=activeLayer();
  const newChars=new Array(artCols*artRows).fill(' ');
  const newCols=new Uint8Array(artCols*artRows);
  for(let y=0;y<artRows;y++)for(let x=0;x<artCols;x++){
    if(!inSel(x,y))continue;
    const p=idx(x,y);
    if(L.chars[p]===' ')continue;
    const nb=[[x-1,y],[x+1,y],[x,y-1],[x,y+1]];
    let edge=false;
    for(const n of nb){
      if(n[0]<0||n[1]<0||n[0]>=artCols||n[1]>=artRows){edge=true;break;}
      if(L.chars[idx(n[0],n[1])]===' '){edge=true;break;}
      if(L.colors[idx(n[0],n[1])]!==L.colors[p]){edge=true;break;}
    }
    if(edge){newChars[p]=L.chars[p]; newCols[p]=L.colors[p];}
  }
  L.chars=newChars; L.colors=newCols;
  flash('EDGE');
}
function filterPosterize(){
  pushHistory('POSTERIZE');
  forEachSel((L,x,y,p)=>{
    if(L.chars[p]===' ')return;
    L.colors[p]=(L.colors[p]-(L.colors[p]%4))%COLORS.length;
  });
  flash('POSTERIZE');
}
function filterScanlines(){
  pushHistory('SCANLINES');
  forEachSel((L,x,y,p)=>{
    if(y%2===0)return;
    if(L.chars[p]===' ')return;
    L.marks[p]=clamp((L.marks[p]||0)+1,0,8);
    L.colors[p]=darkenIdx(L.colors[p]);
  });
  flash('SCANLINES');
}
function filterGlitch(){
  pushHistory('GLITCH');
  const L=activeLayer();
  for(let y=0;y<artRows;y++){
    if(rnd(y*7+t)<0.3){
      const shift=Math.floor((rnd(y*13+t)-0.5)*10);
      const rowChars=[], rowCols=[], rowMarks=[];
      for(let x=0;x<artCols;x++){rowChars.push(L.chars[idx(x,y)]); rowCols.push(L.colors[idx(x,y)]); rowMarks.push(L.marks[idx(x,y)]);}
      for(let x=0;x<artCols;x++){
        if(!inSel(x,y))continue;
        const sx=(x+shift+artCols)%artCols;
        L.chars[idx(x,y)]=rowChars[sx];
        L.colors[idx(x,y)]=rowCols[sx];
        L.marks[idx(x,y)]=rowMarks[sx];
      }
    }
  }
  flash('GLITCHED');
}
function filterDensity(){
  pushHistory('DENSITY');
  forEachSel((L,x,y,p)=>{
    if(L.chars[p]!==' ')return;
    const d=DENSITY[(x*3+y*5+t)%DENSITY.length];
    if(d!==' '){L.chars[p]=d; L.colors[p]=color; L.heat[p]=0.3;}
  });
  flash('DENSITY FILLED');
}
function filterThreshold(){
  pushHistory('THRESHOLD');
  forEachSel((L,x,y,p)=>{
    if(L.chars[p]===' ')return;
    const l=lum(L.colors[p]);
    L.colors[p]=l>128?15:31;
  });
  flash('THRESHOLD');
}
function filterClean(){
  pushHistory('CLEAN');
  forEachSel((L,x,y,p)=>{L.marks[p]=0;});
  flash('MARKS CLEANED');
}

// Image transforms
function flipH(){
  pushHistory('FLIP H');
  for(const L of layers){
    for(let y=0;y<artRows;y++){
      for(let x=0;x<Math.floor(artCols/2);x++){
        const a=idx(x,y), b=idx(artCols-1-x,y);
        [L.chars[a],L.chars[b]]=[L.chars[b],L.chars[a]];
        [L.colors[a],L.colors[b]]=[L.colors[b],L.colors[a]];
        [L.marks[a],L.marks[b]]=[L.marks[b],L.marks[a]];
      }
    }
  }
  flash('FLIPPED H');
}
function flipV(){
  pushHistory('FLIP V');
  for(const L of layers){
    for(let x=0;x<artCols;x++){
      for(let y=0;y<Math.floor(artRows/2);y++){
        const a=idx(x,y), b=idx(x,artRows-1-y);
        [L.chars[a],L.chars[b]]=[L.chars[b],L.chars[a]];
        [L.colors[a],L.colors[b]]=[L.colors[b],L.colors[a]];
        [L.marks[a],L.marks[b]]=[L.marks[b],L.marks[a]];
      }
    }
  }
  flash('FLIPPED V');
}
function rotateCW(){
  pushHistory('ROT CW');
  const nc=artRows, nr=artCols;
  layers=layers.map(L=>{
    const n=nc*nr;
    const d={name:L.name,visible:L.visible,opacity:L.opacity,blend:L.blend,locked:L.locked,
      chars:new Array(n).fill(' '), colors:new Uint8Array(n), marks:new Uint8Array(n), heat:new Float32Array(n)};
    for(let y=0;y<artRows;y++)for(let x=0;x<artCols;x++){
      const a=idx(x,y);
      const nx=artRows-1-y, ny=x;
      const b=ny*nc+nx;
      d.chars[b]=L.chars[a]; d.colors[b]=L.colors[a]; d.marks[b]=L.marks[a]; d.heat[b]=L.heat[a];
    }
    return d;
  });
  artCols=nc; artRows=nr; selection=null;
  flash('ROTATED CW');
}
function rotateCCW(){pushHistory('ROT CCW'); rotateCW();rotateCW();rotateCW(); history.pop();history.pop();history.pop(); flash('ROTATED CCW');}
function cropToSelection(){
  if(!selection){flash('NO SELECTION');return;}
  pushHistory('CROP');
  let minX=artCols,minY=artRows,maxX=-1,maxY=-1;
  for(let y=0;y<artRows;y++)for(let x=0;x<artCols;x++){
    if(selection.mask[y*artCols+x]){
      if(x<minX)minX=x; if(x>maxX)maxX=x;
      if(y<minY)minY=y; if(y>maxY)maxY=y;
    }
  }
  if(maxX<0){flash('EMPTY SEL');return;}
  const nw=maxX-minX+1, nh=maxY-minY+1;
  layers=layers.map(L=>{
    const n=nw*nh;
    const d={name:L.name,visible:L.visible,opacity:L.opacity,blend:L.blend,locked:L.locked,
      chars:new Array(n).fill(' '), colors:new Uint8Array(n), marks:new Uint8Array(n), heat:new Float32Array(n)};
    for(let y=0;y<nh;y++)for(let x=0;x<nw;x++){
      const sp=(minY+y)*artCols+(minX+x);
      const dp=y*nw+x;
      d.chars[dp]=L.chars[sp]; d.colors[dp]=L.colors[sp]; d.marks[dp]=L.marks[sp]; d.heat[dp]=L.heat[sp];
    }
    return d;
  });
  artCols=nw; artRows=nh; selection=null;
  flash('CROPPED');
}
function shiftHue(){
  pushHistory('HUE SHIFT');
  forEachSel((L,x,y,p)=>{ if(L.chars[p]!==' ')L.colors[p]=(L.colors[p]+1)%COLORS.length; });
  flash('HUE +1');
}

function updateLife(){
  for(const L of layers){
    for(let i=0;i<L.heat.length;i++){
      L.heat[i]*=0.96;
      if(L.chars[i]!==' '&&L.marks[i]&&rnd(i+t*0.13)<0.0015)L.marks[i]=Math.max(0,L.marks[i]-1);
    }
  }
  if(mode===6&&down&&gx>=0){
    const L=activeLayer();
    if(!L.locked){
      for(let k=0;k<Math.ceil(strength*1.4);k++){
        const x=clamp(gx+Math.floor((rnd(t+k)-0.5)*size*6),0,artCols-1);
        const y=clamp(gy+Math.floor((rnd(t+k+9)-0.5)*size*6),0,artRows-1);
        if(!inSel(x,y))continue;
        const p=idx(x,y);
        if(L.chars[p]===' '&&rnd(p+t)<strength/18){
          L.chars[p]=GLYPHS[(glyph+p+t)%GLYPHS.length];
          L.colors[p]=color; L.heat[p]=strength/9; L.marks[p]=1;
        }
      }
    }
  }
}

function hitButton(cc,rr){
  for(let i=buttons.length-1;i>=0;i--){
    const b=buttons[i];
    if(cc>=b.c&&cc<b.c+b.w&&rr>=b.r&&rr<b.r+b.h)return b;
  }
  return null;
}

function render(){
  t++;
  ctx.fillStyle=TH.bg;
  ctx.fillRect(0,0,W,H);
  // solid sidebar/tool background (pure fill, still no geometry)
  if(uiCols>=90){
    ctx.fillStyle=TH.side;
    ctx.fillRect(0,0,uiCw*4,H);
    ctx.fillRect((uiCols-18)*uiCw,0,18*uiCw,H);
    ctx.fillRect(0,0,W,uiCh*3.2);
    ctx.fillRect(0,(uiRows-2)*uiCh,W,uiCh*2);
  }
  updateLife();
  buttons=[];
  drawRulers();
  drawDensityBg();
  drawOnion();
  drawComposite();
  drawSelection();
  drawLasso();
  drawPreview();
  drawGrid();
  drawMenuBar();
  drawTopBar();
  drawToolRail();
  drawSidebar();
  drawBottomBar();
  drawMinimap();
  drawMenus();
  drawCursor();
  requestAnimationFrame(render);
}

function pointer(e){
  const p=e.touches?e.touches[0]:e;
  mx=p.clientX; my=p.clientY;
  const cc=Math.floor(mx/uiCw), rr=Math.floor(my/uiCh);
  cx=cc; cy=rr;
  // art coordinate = (px-artPxX)/artCw + panX
  const raw=(mx-artPxX)/artCw;
  const rawY=(my-artPxY)/artCh;
  gx=Math.floor(raw)+panX;
  gy=Math.floor(rawY)+panY;
  if(gx<0||gy<0||gx>=artCols||gy>=artRows){gx=-1;gy=-1;}
  return {cc,rr};
}

function handleButton(b){
  const id=b.id;
  // menu open/toggle
  if(id.startsWith('menu:')){menuOpen=menuOpen===id?null:id; return true;}
  if(menuOpen){
    if(!id.startsWith('menu:')&&doMenuAction(id)){menuOpen=null;return true;}
  }
  if(id.startsWith('mode:')){mode=Number(id.slice(5));flash('MODE '+MODES[mode]); return true;}
  if(id.startsWith('glyph:')){
    if(id==='glyph:search'){promptGlyphSearch();return true;}
    const n=Number(id.slice(6));
    if(!isNaN(n)){glyph=n;flash('GLYPH '+GLYPHS[glyph]);return true;}
  }
  if(id.startsWith('color:')){color=Number(id.slice(6));flash('COLOR '+COLORS[color][0]);return true;}
  if(id.startsWith('color2:')){color2=Number(id.slice(7));flash('BG COLOR '+COLORS[color2][0]);return true;}
  if(id==='swap'){const tmp=color;color=color2;color2=tmp;flash('SWAP COLOR');return true;}
  if(id==='mirror'){mirror=!mirror;flash(mirror?'MIRROR ON':'MIRROR OFF');return true;}
  if(id.startsWith('panel:')){const k=id.slice(6); panelOpen[k]=!panelOpen[k];return true;}
  // meters
  if(id==='size:down'){size=clamp(size-1,1,9);flash('SIZE '+size);return true;}
  if(id==='size:up'){size=clamp(size+1,1,9);flash('SIZE '+size);return true;}
  if(id==='strength:down'){strength=clamp(strength-1,1,9);flash('STR '+strength);return true;}
  if(id==='strength:up'){strength=clamp(strength+1,1,9);flash('STR '+strength);return true;}
  if(id==='pixel:down'){pixelSize=clamp(pixelSize-1,3,12);resize();flash('PX '+pixelSize);return true;}
  if(id==='pixel:up'){pixelSize=clamp(pixelSize+1,3,12);resize();flash('PX '+pixelSize);return true;}
  if(id==='bright:down'){brightness=clamp(brightness-1,-9,9);if(lastImageFile)importImage(lastImageFile,true);flash('BR '+brightness);return true;}
  if(id==='bright:up'){brightness=clamp(brightness+1,-9,9);if(lastImageFile)importImage(lastImageFile,true);flash('BR '+brightness);return true;}
  if(id==='contrast:down'){contrast=clamp(contrast-1,-9,9);if(lastImageFile)importImage(lastImageFile,true);flash('CT '+contrast);return true;}
  if(id==='contrast:up'){contrast=clamp(contrast+1,-9,9);if(lastImageFile)importImage(lastImageFile,true);flash('CT '+contrast);return true;}
  // layers
  if(id.startsWith('layer:sel:')){active=Number(id.slice(10));flash('LAYER '+layers[active].name);return true;}
  if(id==='layer:new'){pushHistory('NEW LAYER');addLayer();return true;}
  if(id==='layer:dup'){pushHistory('DUP LAYER');duplicateLayer();return true;}
  if(id==='layer:del'){pushHistory('DEL LAYER');removeLayer();return true;}
  if(id==='layer:up'){pushHistory('LAYER UP');moveLayerUp();return true;}
  if(id==='layer:down'){pushHistory('LAYER DOWN');moveLayerDown();return true;}
  if(id==='layer:mg'){pushHistory('MERGE');mergeDown();return true;}
  if(id==='layer:flat'){pushHistory('FLATTEN');flatten();return true;}
  if(id==='layer:blend'){activeLayer().blend=(activeLayer().blend+1)%BLENDS.length;flash('BLEND '+BLENDS[activeLayer().blend]);return true;}
  if(id==='layer:op:down'){activeLayer().opacity=clamp(activeLayer().opacity-10,0,100);flash('OP '+activeLayer().opacity);return true;}
  if(id==='layer:op:up'){activeLayer().opacity=clamp(activeLayer().opacity+10,0,100);flash('OP '+activeLayer().opacity);return true;}
  // quick actions
  if(id==='act:undo'){undo();return true;}
  if(id==='act:redo'){redo();return true;}
  if(id==='act:copy'){copySelection(false);return true;}

function tone(v){
  const b=brightness*14;
  const c=contrast*18;
  const factor=(259*(c+255))/(255*(259-c));
  return clamp(Math.round(factor*(v-128)+128+b),0,255);
}
function nearestColor(r,g,b){
  let best=0,bestD=Infinity;
  for(let i=0;i<COLORS.length;i++){
    const cr=paletteRgb(i);
    const d=(r-cr[0])*(r-cr[0])+(g-cr[1])*(g-cr[1])+(b-cr[2])*(b-cr[2]);
    if(d<bestD){bestD=d;best=i;}
  }
  return best;
}
async function importImage(file,reprocess=false){
  if(!file)return;
  try{
    lastImageFile=file;
    const bmp=await createImageBitmap(file);
    const scale=Math.min(artCols/bmp.width,artRows/bmp.height);
    const dw=Math.max(1,Math.floor(bmp.width*scale));
    const dh=Math.max(1,Math.floor(bmp.height*scale));
    const ox=Math.floor((artCols-dw)/2), oy=Math.floor((artRows-dh)/2);
    const off=document.createElement('canvas');
    off.width=dw; off.height=dh;
    const octx=off.getContext('2d',{willReadFrequently:true});
    octx.drawImage(bmp,0,0,dw,dh);
    const data=octx.getImageData(0,0,dw,dh).data;
    const ramp=[' ','·','∙','░','▒','▓','█','@','#','%','✹','✺'];
    if(!reprocess)pushHistory('IMPORT');
    const target=reprocess?activeLayer():makeLayer('IMAGE');
    if(!reprocess){
      layers.splice(active+1,0,target);
      active++;
    }else{target.chars.fill(' ');target.colors.fill(0);target.marks.fill(0);target.heat.fill(0);}
    for(let y=0;y<dh;y++)for(let x=0;x<dw;x++){
      const p=(y*dw+x)*4, a=data[p+3]/255;
      if(a<0.08)continue;
      const r=tone(data[p]), g=tone(data[p+1]), b=tone(data[p+2]);
      const l=(0.2126*r+0.7152*g+0.0722*b)/255;
      const sat=(Math.max(r,g,b)-Math.min(r,g,b))/255;
      const n=idx(ox+x,oy+y);
      const edge=x>0&&y>0?Math.abs(r-tone(data[p-4]))+Math.abs(g-tone(data[p-3]))+Math.abs(b-tone(data[p-2]))+Math.abs(r-tone(data[p-dw*4]))+Math.abs(g-tone(data[p-dw*4+1]))+Math.abs(b-tone(data[p-dw*4+2])):0;
      const gi=clamp(Math.floor((1-l)*ramp.length+sat*2+edge/420),0,ramp.length-1);
      target.chars[n]=ramp[gi]===' '?'·':ramp[gi];
      target.colors[n]=nearestColor(r,g,b);
      target.heat[n]=0.65;
      target.marks[n]=clamp(Math.floor(sat*4+edge/260),0,7);
    }
    if(bmp.close)bmp.close();
    flash('IMAGE → CHARACTERS');
  }catch(err){
    flash('IMAGE FAILED');
  }
}

function renderArtCanvas(phase){
  composite();
  const out=document.createElement('canvas');
  out.width=Math.max(1,Math.ceil(artCols*artCw));
  out.height=Math.max(1,Math.ceil(artRows*artCh));
  const o=out.getContext('2d',{willReadFrequently:true,alpha:false});
  o.fillStyle=TH.bg; o.fillRect(0,0,out.width,out.height);
  setFont(artCell,o);
  for(let y=0;y<artRows;y++){
    for(let x=0;x<artCols;x++){
      const p=y*artCols+x;
      const ch=compBuf.chars[p];
      if(ch===' ')continue;
      const decor=decorated(ch,compBuf.marks[p],phase||0);
      o.globalAlpha=clamp(0.55+compBuf.alpha[p]*0.55,0.55,1);
      o.fillStyle=COLORS[compBuf.colors[p]][1];
      o.fillText(decor,x*artCw,y*artCh);
    }
  }
  o.globalAlpha=1;
  return out;
}
function downloadBlob(blob,name){
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=name;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}

function exportTxt(){
  composite();

  for(let y=0;y<artRows;y++){let s='';for(let x=0;x<artCols;x++)s+=compBuf.chars[y*artCols+x];lines.push(s.replace(/\s+$/,''));}
  const blob=new Blob([lines.join('\n')],{type:'text/plain'});
  downloadBlob(blob,'characterworld.txt');
  flash('TXT EXPORTED');
}
function exportAnsi(){
  composite();
  const esc='\x1b[';
  const out=[];
  let lastHex=null;
  for(let y=0;y<artRows;y++){
    for(let x=0;x<artCols;x++){
      const p=y*artCols+x;
      const ch=compBuf.chars[p];
      if(ch===' '){out.push(' ');continue;}
      const hex=COLORS[compBuf.colors[p]][1];
      if(hex!==lastHex){
        const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
        out.push(esc+'38;2;'+r+';'+g+';'+b+'m');
        lastHex=hex;
      }
      out.push(decorated(ch,compBuf.marks[p],0));
    }
    out.push(esc+'0m\n');
    lastHex=null;
  }
  const blob=new Blob([out.join('')],{type:'text/plain'});
  downloadBlob(blob,'characterworld.ans');
  flash('ANSI EXPORTED');
}

// GIF
function rgbFromHex(hex){return[parseInt(hex.slice(1,3),16),parseInt(hex.slice(3,5),16),parseInt(hex.slice(5,7),16)];}
function nearestPaletteIndex(r,g,b,palette){let best=0,bd=Infinity;for(let i=0;i<palette.length;i++){const c=palette[i];const d=(r-c[0])**2+(g-c[1])**2+(b-c[2])**2;if(d<bd){bd=d;best=i;}}return best;}
function canvasToIndexed(c,palette){const o=c.getContext('2d',{willReadFrequently:true});const data=o.getImageData(0,0,c.width,c.height).data;const out=new Uint8Array(c.width*c.height);for(let i=0,j=0;i<data.length;i+=4,j++)out[j]=nearestPaletteIndex(data[i],data[i+1],data[i+2],palette);return out;}
function pushWord(bytes,n){bytes.push(n&255,(n>>8)&255);}
function lzwEncode(indices,minCodeSize){const clear=1<<minCodeSize,end=clear+1;let codeSize=minCodeSize+1,next=end+1;const dict=new Map();for(let i=0;i<clear;i++)dict.set(String(i),i);const data=[];let cur=0,bits=0;function emit(code){cur|=code<<bits;bits+=codeSize;while(bits>=8){data.push(cur&255);cur>>=8;bits-=8;}}emit(clear);let w=String(indices[0]||0);for(let i=1;i<indices.length;i++){const k=indices[i],wk=w+','+k;if(dict.has(wk))w=wk;else{emit(dict.get(w));if(next<4096){dict.set(wk,next++);if(next===(1<<codeSize)&&codeSize<12)codeSize++;}else{emit(clear);dict.clear();for(let j=0;j<clear;j++)dict.set(String(j),j);codeSize=minCodeSize+1;next=end+1;}w=String(k);}}emit(dict.get(w));emit(end);if(bits>0)data.push(cur&255);const blocks=[];for(let i=0;i<data.length;i+=255){const chunk=data.slice(i,i+255);blocks.push(chunk.length,...chunk);}blocks.push(0);return blocks;}
function gifBlob(frames,w,h,palette,delay){let tableSize=1;while(tableSize<palette.length)tableSize*=2;tableSize=Math.max(4,tableSize);const sizeBits=Math.log2(tableSize)-1;const minCodeSize=Math.max(2,Math.ceil(Math.log2(tableSize)));const bytes=[71,73,70,56,57,97];pushWord(bytes,w);pushWord(bytes,h);bytes.push(0x80|0x70|sizeBits,0,0);for(let i=0;i<tableSize;i++){const c=palette[i]||[0,0,0];bytes.push(c[0],c[1],c[2]);}bytes.push(0x21,0xff,11,78,69,84,83,67,65,80,69,50,46,48,3,1,0,0,0);for(const indices of frames){bytes.push(0x21,0xf9,4,0);pushWord(bytes,delay);bytes.push(0,0x2c);pushWord(bytes,0);pushWord(bytes,0);pushWord(bytes,w);pushWord(bytes,h);bytes.push(0,minCodeSize,...lzwEncode(indices,minCodeSize));}bytes.push(0x3b);return new Blob([new Uint8Array(bytes)],{type:'image/gif'});}
function exportGif(){
  flash('GIF BUILDING');
  setTimeout(()=>{
    const palette=[[3,4,3],[51,64,51],...COLORS.map(c=>rgbFromHex(c[1]))];
    const frames=[]; let w=0,h=0;
    for(let i=0;i<16;i++){const c=renderArtCanvas(t+i*5);w=c.width;h=c.height;frames.push(canvasToIndexed(c,palette));}
    downloadBlob(gifBlob(frames,w,h,palette,6),'characterworld.gif');
    flash('GIF EXPORTED');
  },20);
}

let spaceDown=false;
function onDown(e,p){
  const id=hitButton(p.cc,p.rr);
  if(id&&handleButton(id))return;
  if(menuOpen){menuOpen=null;return;}
  if(gx<0)return;
  // ALT for eyedrop / clone-source
  if(e.altKey){
    if(mode===17){cloneSource=[gx,gy]; cloneOffset=null; flash('CLONE SRC '+gx+','+gy); return;}
    eyedropAt(gx,gy); return;
  }
  if(spaceDown||e.button===1){return;}
  down=true; lastGX=gx; lastGY=gy; dragStart={x:gx,y:gy}; preview=null;
  // selection tools
  if(mode===13){selAnchor={x:gx,y:gy}; return;}
  if(mode===14){lassoPath=[[gx,gy]]; return;}
  if(mode===15){pushHistory('WAND'); selectMagic(gx,gy,e.shiftKey); return;}
  if(mode===16){ // MOVE
    if(!selection){flash('NO SELECTION');down=false;return;}
    pushHistory('MOVE');
    moveOffset=[0,0]; moveBase={x:gx,y:gy};
    copySelection(true); // cut to temp; we'll paste on release at offset
    return;
  }
  if(mode===3){eyedropAt(gx,gy); down=false; return;}
  if(mode===10){pushHistory('FILL'); fillArea(gx,gy); down=false; return;}
  if(mode===7||mode===8||mode===9||mode===11){preview=shapeCells(gx,gy,gx,gy,mode===7?'line':mode===8?'box':'orb'); return;}
  if(mode===12){typeAnchor=[gx,gy]; typeBuffer=''; flash('TYPE… ENTER=commit'); down=false; return;}
  if(mode===17){
    if(!cloneSource){flash('ALT-CLICK TO SET SOURCE'); down=false; return;}
    cloneOffset=[gx-cloneSource[0], gy-cloneSource[1]];
    pushHistory('CLONE');
    paintAt(gx,gy);
    return;
  }
  pushHistory(MODES[mode]);
  paintAt(gx,gy);
}

function onMove(e,p){
  if(!down)return;
  if(gx<0)return;
  if(mode===13&&selAnchor){
    // preview rect via selection temp? we'll draw marching ants by committing to selection progressively
    selectRect(selAnchor.x,selAnchor.y,gx,gy,e.shiftKey);
    return;
  }
  if(mode===14){lassoPath.push([gx,gy]); return;}
  if(mode===16&&selection&&moveBase){
    // shift selection mask & contents by delta since moveBase
    const dx=gx-moveBase.x, dy=gy-moveBase.y;
    moveOffset=[dx,dy];
    // Render preview by temporarily shifting clipboard contents on display? Simpler: apply shift on mouseup.
    return;
  }
  if(mode===7)preview=shapeCells(dragStart.x,dragStart.y,gx,gy,'line');
  else if(mode===8)preview=shapeCells(dragStart.x,dragStart.y,gx,gy,'box');
  else if(mode===9)preview=shapeCells(dragStart.x,dragStart.y,gx,gy,'orb');
  else if(mode===11)preview=shapeCells(dragStart.x,dragStart.y,gx,gy,'box'); // gradient area preview
  else if(mode===13||mode===14||mode===15||mode===16){}
  else {paintLine(lastGX,lastGY,gx,gy); lastGX=gx; lastGY=gy;}
}

function onUp(){
  if(!down)return;
  if(gx>=0&&dragStart){
    if(mode===7)commitShape('line',dragStart.x,dragStart.y,gx,gy);
    else if(mode===8)commitShape('box',dragStart.x,dragStart.y,gx,gy);
    else if(mode===9)commitShape('orb',dragStart.x,dragStart.y,gx,gy);
    else if(mode===11){pushHistory('GRADIENT'); gradientFill(dragStart.x,dragStart.y,gx,gy);}
    else if(mode===14){selectLasso(lassoPath,false); lassoPath=null;}
    else if(mode===16&&moveOffset&&clipboard){
      // paste clipboard at shifted location
      const L=activeLayer();
      const w=clipboard.w, h=clipboard.h;
      // find original top-left of selection (before cut): saved via moveBase... but we cut to clipboard which re-centered paste
      // re-paste at moveBase + offset
      const ox=moveBase.x-Math.floor(w/2)+moveOffset[0];
      const oy=moveBase.y-Math.floor(h/2)+moveOffset[1];
      const n=artCols*artRows;
      const mask=new Uint8Array(n);
      for(let y=0;y<h;y++)for(let x=0;x<w;x++){
        const sp=y*w+x;
        if(!clipboard.mask[sp])continue;
        const dx=ox+x, dy=oy+y;
        if(dx<0||dy<0||dx>=artCols||dy>=artRows)continue;
        const dp=dy*artCols+dx;
        L.chars[dp]=clipboard.chars[sp];
        L.colors[dp]=clipboard.colors[sp];
        L.marks[dp]=clipboard.marks[sp];
        L.heat[dp]=0.7;
        mask[dp]=1;
      }
      selection={x:0,y:0,w:artCols,h:artRows,mask};
    }
  }
  down=false; lastGX=-1; lastGY=-1; dragStart=null; preview=null; selAnchor=null; moveBase=null; moveOffset=null;
}

function eyedropAt(x,y){
  const L=activeLayer();
  const p=idx(x,y);
  if(L.chars[p]!==' '){
    const gi=GLYPHS.indexOf(L.chars[p]); if(gi>=0)glyph=gi;
    color=L.colors[p];
    flash('EYE: '+L.chars[p]+' '+COLORS[color][0]);
  }else{flash('EMPTY');}
}

function wheel(e){
  e.preventDefault();
  if(e.ctrlKey||e.metaKey){zoomBy(e.deltaY>0?0.9:1.1);return;}
  if(e.shiftKey){glyph=(glyph+(e.deltaY>0?1:-1)+GLYPHS.length)%GLYPHS.length; flash('GLYPH '+GLYPHS[glyph]); return;}
  if(e.altKey){strength=clamp(strength+(e.deltaY>0?1:-1),1,9); flash('ST '+strength); return;}
  size=clamp(size+(e.deltaY>0?1:-1),1,9); flash('SZ '+size);
}

window.addEventListener('mousedown',e=>{
  const p=pointer(e);
  if(spaceDown||e.button===1){down=true; dragStart={x:mx,y:my,panX,panY}; return;}
  onDown(e,p);
});
window.addEventListener('mouseup',e=>{
  if(spaceDown||e.button===1){down=false; dragStart=null; return;}
  onUp();
});
window.addEventListener('mouseleave',()=>{down=false; gx=-1; gy=-1; dragStart=null; preview=null; lassoPath=null;});
window.addEventListener('touchstart',e=>{
  e.preventDefault();
  const p=pointer(e);
  onDown(e,p);
},{passive:false});
window.addEventListener('touchmove',e=>{
  e.preventDefault();
  const p=pointer(e);
  onMove(e,p);
},{passive:false});
window.addEventListener('touchend',()=>{onUp();});
window.addEventListener('wheel',wheel,{passive:false});

window.addEventListener('keydown',e=>{
  if(ioLayer.classList.contains('on')&&e.key==='Escape'){closeIo();return;}
  if(ioLayer.classList.contains('on'))return;
  // type tool capture
  if(mode===12&&typeAnchor){
    if(e.key==='Escape'){typeAnchor=null;typeBuffer='';flash('TYPE CANCEL');return;}
    if(e.key==='Enter'){pushHistory('TYPE'); placeType(typeAnchor,typeBuffer); typeAnchor=null; typeBuffer=''; flash('TYPE DONE'); return;}
    if(e.key==='Backspace'){typeBuffer=typeBuffer.slice(0,-1); message='TYPE: '+typeBuffer; return;}
    if(e.key.length===1&&!e.ctrlKey&&!e.metaKey){typeBuffer+=e.key; message='TYPE: '+typeBuffer; e.preventDefault(); return;}
  }
  const meta=e.ctrlKey||e.metaKey;
  if(e.key==='Escape'){menuOpen=null; deselect(); return;}
  if(e.key===' '){spaceDown=true; return;}
  if(meta&&e.key.toLowerCase()==='z'){e.preventDefault(); if(e.shiftKey)redo(); else undo(); return;}
  if(meta&&e.key.toLowerCase()==='y'){e.preventDefault(); redo(); return;}
  if(meta&&e.key.toLowerCase()==='c'){e.preventDefault(); copySelection(false); return;}
  if(meta&&e.key.toLowerCase()==='x'){e.preventDefault(); pushHistory('CUT'); copySelection(true); return;}
  if(meta&&e.key.toLowerCase()==='v'){e.preventDefault(); paste(); return;}
  if(meta&&e.key.toLowerCase()==='a'){e.preventDefault(); selectAll(); return;}
  if(meta&&e.key.toLowerCase()==='d'){e.preventDefault(); deselect(); return;}
  if(meta&&e.key.toLowerCase()==='i'&&e.shiftKey){e.preventDefault(); invertSelection(); return;}
  if(meta&&e.key.toLowerCase()==='s'){e.preventDefault(); saveLocal(); return;}
  if(meta&&e.key.toLowerCase()==='o'){e.preventDefault(); loadLocal(); return;}
  if(meta&&e.key.toLowerCase()==='j'){e.preventDefault(); duplicateLayer(); return;}
  if(meta&&e.key.toLowerCase()==='e'){e.preventDefault(); pushHistory('MERGE'); mergeDown(); return;}
  if(meta&&e.key===']'){e.preventDefault(); moveLayerUp(); return;}
  if(meta&&e.key==='['){e.preventDefault(); moveLayerDown(); return;}
  if(meta&&e.shiftKey&&e.key.toLowerCase()==='n'){e.preventDefault(); addLayer(); return;}
  if(e.key==='+'||(e.key==='='&&!e.shiftKey&&!meta)){zoomBy(1.25); return;}
  if(e.key==='-'||e.key==='_'){if(e.shiftKey||meta)return; zoomBy(0.8); return;}
  if(e.key==='0'){fitView(); return;}
  if(e.key==='1'){zoom=1; resize(); flash('ZOOM 1.00'); return;}
  if(e.key.toLowerCase()==='g'&&!meta){showGrid=!showGrid; flash(showGrid?'GRID ON':'GRID OFF'); return;}
  if(e.key.toLowerCase()==='t'&&!meta&&mode!==12){bgTheme=(bgTheme+1)%THEMES.length; TH=THEMES[bgTheme]; flash('THEME '+(bgTheme+1)); return;}
  if(e.key==='['){size=clamp(size-1,1,9);flash('SZ '+size); return;}
  if(e.key===']'){size=clamp(size+1,1,9);flash('SZ '+size); return;}
  if(e.key==='ArrowLeft'){panX=clamp(panX-3,-8,artCols+8); return;}
  if(e.key==='ArrowRight'){panX=clamp(panX+3,-8,artCols+8); return;}
  if(e.key==='ArrowUp'){panY=clamp(panY-3,-8,artRows+8); return;}
  if(e.key==='ArrowDown'){panY=clamp(panY+3,-8,artRows+8); return;}
  // tool keys
  if(!meta&&!e.shiftKey){
    for(let i=0;i<MODES.length;i++){
      if(MODE_KEY[MODES[i]]===e.key.toUpperCase()){mode=i; flash('MODE '+MODES[i]); return;}
    }
  }
  // digits: strength
  if(e.key>='1'&&e.key<='9'&&e.altKey){strength=Number(e.key); flash('ST '+strength); return;}
});
window.addEventListener('keyup',e=>{
  if(e.key===' ')spaceDown=false;
});

imgIn.addEventListener('change',e=>importImage(e.target.files[0]));

// ======================================================================
// INIT
// ======================================================================
resize();
render();
</script>
</body>
