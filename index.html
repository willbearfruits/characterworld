<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>characterworld/os</title>
<meta name="description" content="CHARACTERWORLD/OS вҖ” a tiny operating system from a timeline that never invented pixels. Every program is character-only.">
<meta name="author" content="willbear / glitches">
<meta name="theme-color" content="#030403">
<meta property="og:type" content="website">
<meta property="og:title" content="characterworld/os">
<meta property="og:description" content="A tiny operating system from a timeline that never invented pixels. Every program is character-only.">
<meta property="og:image" content="https://willbearfruits.github.io/characterworld/charactershop/og.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:url" content="https://willbearfruits.github.io/characterworld/">
<meta property="og:site_name" content="characterworld">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="characterworld/os">
<meta name="twitter:description" content="A tiny operating system from a timeline that never invented pixels.">
<meta name="twitter:image" content="https://willbearfruits.github.io/characterworld/charactershop/og.png">
<link rel="icon" href="data:image/svg+xml;utf8,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%2064%2064%22%3E%3Crect%20width%3D%2264%22%20height%3D%2264%22%20fill%3D%22%23030403%22%2F%3E%3Ctext%20x%3D%2250%25%22%20y%3D%2254%22%20text-anchor%3D%22middle%22%20font-family%3D%22Courier%20New%2Cmonospace%22%20font-size%3D%2256%22%20font-weight%3D%22bold%22%20fill%3D%22%23fff16a%22%3E%E2%8C%96%3C%2Ftext%3E%3C%2Fsvg%3E">
<style>
html,body{margin:0;height:100%;overflow:hidden;background:#030403;color:#d8f0c0;font-family:"Courier New",Courier,monospace}
body{cursor:none;user-select:none;-webkit-user-select:none}
canvas{display:block;width:100vw;height:100vh;background:#030403}
a{color:inherit;text-decoration:none}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(() => {
  const cv = document.getElementById('c');
  const ctx = cv.getContext('2d');
  const BG = '#030403',
        DIM = '#22301f',
        LOW = '#4d6147',
        MID = '#7a9572',
        HI  = '#d8f0c0',
        ACCENT = '#fff16a',
        WARM = '#ff8a5c',
        COOL = '#6ab7ff',
        BAR  = '#3a5234';

  const NOISE = 'в–‘в–’в–“В·вҲҷвҖўв—ҰвҲҳв—Ңв—Қв—ҺвҲҙвҲөвӢ®вӢҜв–Әв–«в—Ҷв—ҮвҖ№вҖәВ«В»/\\|ВҰвҖ вҖЎВ§В¶'.split('');

  let cell = 16, cols = 0, rows = 0, dpr = 1;
  let mouseC = -1, mouseR = -1, pressed = false;
  let t = 0;

  // в”Җв”Җ program manifest в”Җв”Җ
  // each entry has a 12Г—2 "icon" вҖ” a tiny pictogram drawn with characters.
  // pad icon rows with spaces to be exactly 12 chars wide.
  const ENTRIES = [
    {
      id: '01', name: 'ATELIER', file: 'ATELIER.EXE',
      tag: 'paint program',
      note: 'photoshop-style canvas',
      icon: [
        'в–‘в–’в–“в–Ҳв–“в–’в–‘ в•ұв•ів•І',
        'в–’в–Ҳв–“ в–“ в–’в–‘ в•ів•ұ',
      ],
      href: 'charactershop/', live: true, key: '1',
    },
    {
      id: '02', name: 'FILM', file: 'FILM.EXE',
      tag: 'video editor',
      note: 'webcam вҶ’ glyphs',
      icon: [
        'в–әв–Јв–Јв–Јв–Јв–Јв–Јв–Јв–Јв—„ ',
        'в–’в–“в–‘в–’в–“в–‘в–’в–“в–‘в–’в–‘',
      ],
      href: 'characterfilm/', live: true, key: '2',
    },
    {
      id: '03', name: 'GRAIN', file: 'GRAIN.EXE',
      tag: 'granular synth',
      note: 'mycelium scheduler',
      icon: [
        'В·вҲҙВ·вӢҜвҲөВ·вӢ®В·вҲҙвҲөВ·',
        'вҲҳв—ҰвҲҷвҖўвҲҳВ·в—ҰвҲҷВ·вҲҳвҲҷ ',
      ],
      href: 'charactergrain/', live: true, key: '3',
    },
    {
      id: '04', name: 'TRACKER', file: 'TRACKER.EXE',
      tag: '16-voice tracker',
      note: 'breakcore polyrhythm',
      icon: [
        'в–Әв–«в–Әв–«в–Әв–«в–Әв–«в–Әв–«в–Ә',
        'в–‘в–’в–Ҳв–‘в–’в–Ҳв–‘в–’в–Ҳв–‘в–’ ',
      ],
      href: 'charactertracker/', live: true, key: '4',
    },
    {
      id: '05', name: 'DELVE', file: 'DELVE.EXE',
      tag: 'roguelike',
      note: 'walking grain bursts',
      icon: [
        '##.. @ ..## ',
        '. # в–‘в–’ # .  ',
      ],
      href: 'characterdelve/', live: true, key: '5',
    },
    {
      id: '06', name: '------', file: 'TBA.SYS',
      tag: 'reserved',
      note: 'more pieces queued',
      icon: [
        'в–‘ в–‘ в–‘ в–‘ в–‘ в–‘ ',
        'В· В· В· В· В· В· ',
      ],
      href: null, live: false, key: null,
    },
  ];

  function resize() {
    dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
    const w = window.innerWidth, h = window.innerHeight;
    cv.width = w * dpr; cv.height = h * dpr;
    cv.style.width = w + 'px'; cv.style.height = h + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    cell = Math.max(11, Math.min(20, Math.floor(Math.min(w, h) / 46)));
    cols = Math.floor(w / cell);
    rows = Math.floor(h / cell);
    ctx.font = `bold ${Math.floor(cell * 1.02)}px "Courier New", Courier, monospace`;
    ctx.textBaseline = 'top';
    ctx.textAlign = 'center';
  }
  resize();
  window.addEventListener('resize', resize);

  // pointer вҶ’ cell
  function updatePointer(e) {
    const r = cv.getBoundingClientRect();
    const x = (e.clientX ?? (e.touches?.[0]?.clientX)) - r.left;
    const y = (e.clientY ?? (e.touches?.[0]?.clientY)) - r.top;
    mouseC = Math.floor(x / cell);
    mouseR = Math.floor(y / cell);
  }
  cv.addEventListener('mousemove', updatePointer);
  cv.addEventListener('mousedown', (e) => { updatePointer(e); pressed = true; });
  cv.addEventListener('mouseup',   (e) => { updatePointer(e); pressed = false; handleClick(); });
  cv.addEventListener('mouseleave',()  => { mouseC = mouseR = -1; pressed = false; });
  cv.addEventListener('touchstart',(e) => { updatePointer(e); pressed = true; }, { passive: true });
  cv.addEventListener('touchmove',  updatePointer, { passive: true });
  cv.addEventListener('touchend',  (e) => { pressed = false; handleClick(); });

  // в”Җв”Җ hit-testing в”Җв”Җ
  let hits = [];
  function addHit(c, r, w, h, action) { hits.push({ c, r, w, h, action }); }
  function hitAt(c, r) {
    for (let i = hits.length - 1; i >= 0; i--) {
      const b = hits[i];
      if (c >= b.c && c < b.c + b.w && r >= b.r && r < b.r + b.h) return b;
    }
    return null;
  }
  function handleClick() {
    const h = hitAt(mouseC, mouseR);
    if (h && h.action) h.action();
  }

  function putChar(ch, c, r, color, alpha) {
    if (c < 0 || r < 0 || c >= cols || r >= rows) return;
    ctx.globalAlpha = alpha ?? 1;
    ctx.fillStyle = color;
    ctx.fillText(ch, c * cell + cell / 2, r * cell + (cell - Math.floor(cell * 1.02)) / 2 + 1);
    ctx.globalAlpha = 1;
  }
  function putText(s, c, r, color, alpha) {
    for (let i = 0; i < s.length; i++) putChar(s[i], c + i, r, color, alpha);
  }

  // seeded hash
  function h2(x, y) {
    let n = (x * 374761393 + y * 668265263) ^ 0x27d4eb2d;
    n = (n ^ (n >>> 15)) * 2246822519;
    n = (n ^ (n >>> 13)) * 3266489917;
    return ((n ^ (n >>> 16)) >>> 0) / 0xffffffff;
  }

  // в”Җв”Җ background: sparse glyph field, the "vacuum" of the OS в”Җв”Җ
  function drawBackground() {
    const phase = t * 0.004;
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const hn = h2(c, r);
        const wave = 0.5 + 0.5 * Math.sin(phase + c * 0.09 - r * 0.11 + hn * 6.28);
        const d = wave * (0.32 + hn * 0.42);
        if (d < 0.58) continue;
        const g = NOISE[Math.floor((hn * 137 + t * 0.02) % NOISE.length + NOISE.length) % NOISE.length];
        const col = d > 0.88 ? LOW : DIM;
        putChar(g, c, r, col, d > 0.88 ? 0.45 : 0.30);
      }
    }
    // very faint scanlines
    for (let r = 0; r < rows; r += 3) {
      for (let c = 0; c < cols; c++) putChar('В·', c, r, DIM, 0.05);
    }
  }

  // в”Җв”Җ outer chrome: double-line border like a CRT bezel в”Җв”Җ
  function drawOuterFrame() {
    const x0 = 0, y0 = 0, x1 = cols - 1, y1 = rows - 1;
    for (let c = x0 + 1; c < x1; c++) { putChar('в•җ', c, y0, MID, 0.85); putChar('в•җ', c, y1, MID, 0.85); }
    for (let r = y0 + 1; r < y1; r++) { putChar('в•‘', x0, r, MID, 0.85); putChar('в•‘', x1, r, MID, 0.85); }
    putChar('в•”', x0, y0, MID, 0.95); putChar('в•—', x1, y0, MID, 0.95);
    putChar('в•ҡ', x0, y1, MID, 0.95); putChar('в•қ', x1, y1, MID, 0.95);

    // separator under menu bar
    const menuSep = 2;
    for (let c = x0 + 1; c < x1; c++) putChar('в”Җ', c, menuSep, LOW, 0.7);
    putChar('в•ҹ', x0, menuSep, MID, 0.85); putChar('в•ў', x1, menuSep, MID, 0.85);

    // separator above status bar
    const statSep = y1 - 2;
    for (let c = x0 + 1; c < x1; c++) putChar('в”Җ', c, statSep, LOW, 0.7);
    putChar('в•ҹ', x0, statSep, MID, 0.85); putChar('в•ў', x1, statSep, MID, 0.85);

    return { x0, y0, x1, y1, menuSep, statSep };
  }

  function pad2(n) { return n < 10 ? '0' + n : '' + n; }
  function clockStr() {
    const d = new Date();
    return pad2(d.getHours()) + ':' + pad2(d.getMinutes()) + ':' + pad2(d.getSeconds());
  }

  // в”Җв”Җ menu bar: title left, menus middle, clock right в”Җв”Җ
  function drawMenuBar(box) {
    const r = 1;
    // title
    const title = ' CHARACTERWORLD/OS ';
    putText(title, box.x0 + 2, r, ACCENT, 1);
    // version mark
    putText(' v0.5 ', box.x0 + 2 + title.length, r, MID, 0.85);

    // menus
    const menus = [' FILE ', ' RUN ', ' VIEW ', ' HELP '];
    let mc = box.x0 + 2 + title.length + 8;
    const totalMenus = menus.reduce((a, s) => a + s.length, 0);
    if (mc + totalMenus < box.x1 - 14) {
      for (const m of menus) {
        const hovered = mouseR === r && mouseC >= mc && mouseC < mc + m.length;
        putText(m, mc, r, hovered ? ACCENT : HI, hovered ? 1 : 0.85);
        if (hovered) addHit(mc, r, m.length, 1, () => {});
        mc += m.length + 1;
      }
    }

    // clock + corner accent
    const cs = clockStr();
    const dateStr = '2026В·' + cs;
    putText(dateStr, box.x1 - dateStr.length - 2, r, MID, 0.9);
    putChar('вҢ–', box.x1 - 1, r, ACCENT, 0.9 + 0.1 * Math.sin(t * 0.1));
  }

  // в”Җв”Җ prompt line below the menu bar в”Җв”Җ
  function drawPrompt(box) {
    const r = box.menuSep + 2;
    const txt = 'C:\\CHARACTERWORLD\\>';
    putText(txt, box.x0 + 3, r, HI, 0.95);
    // blinking cursor
    const blink = Math.floor(t / 30) % 2 === 0;
    putChar(blink ? 'в–Ҳ' : 'в–’', box.x0 + 3 + txt.length + 1, r, ACCENT, blink ? 0.95 : 0.5);
    // boot-tag right side
    const stamp = 'READY В· 6 PROGRAMS В· ' + ENTRIES.filter(e => e.live).length + ' LIVE';
    if (box.x1 - stamp.length - 3 > box.x0 + 3 + txt.length + 8) {
      putText(stamp, box.x1 - stamp.length - 3, r, MID, 0.7);
    }
  }

  // в”Җв”Җ program tile в”Җв”Җ
  // 22 wide Г— 5 tall window
  const TW = 22, TH = 5;
  function drawTile(e, c0, r0, idx) {
    const hovered = mouseC >= c0 && mouseC < c0 + TW && mouseR >= r0 && mouseR < r0 + TH && e.live;
    const focusCol = hovered ? ACCENT : (e.live ? MID : LOW);
    const titleCol = hovered ? ACCENT : (e.live ? HI : LOW);
    const innerCol = e.live ? (hovered ? HI : MID) : LOW;
    const al = e.live ? 1 : 0.55;

    // top border with embedded title  в”Ңв”Җ[ 01 ATELIER  ]в”Җв”Җв”җ
    const titleStr = '[ ' + e.id + ' ' + e.name.padEnd(7, ' ') + ']';
    const top = 'в”Ңв”Җ' + titleStr + 'в”Җ'.repeat(Math.max(0, TW - 4 - titleStr.length)) + 'в”җ';
    for (let i = 0; i < TW; i++) {
      const ch = top[i] || ' ';
      const isTitleChar = i >= 2 && i < 2 + titleStr.length;
      putChar(ch, c0 + i, r0, isTitleChar ? titleCol : focusCol, al);
    }

    // sides
    putChar('в”Ӯ', c0, r0 + 1, focusCol, al);
    putChar('в”Ӯ', c0 + TW - 1, r0 + 1, focusCol, al);
    putChar('в”Ӯ', c0, r0 + 2, focusCol, al);
    putChar('в”Ӯ', c0 + TW - 1, r0 + 2, focusCol, al);
    putChar('в”Ӯ', c0, r0 + 3, focusCol, al);
    putChar('в”Ӯ', c0 + TW - 1, r0 + 3, focusCol, al);

    // icon rows (centered in inner width = TW-4)
    const innerW = TW - 4;
    const ic0 = c0 + 2 + Math.max(0, Math.floor((innerW - 12) / 2));
    const a1 = e.live ? (hovered ? 1 : 0.9) : 0.45;
    const iconCol1 = e.live ? (hovered ? ACCENT : HI) : LOW;
    const iconCol2 = e.live ? (hovered ? HI : MID) : LOW;
    // subtle per-frame jitter so icons feel alive
    const flicker = (i) => 0.88 + 0.12 * Math.sin(t * 0.07 + idx + i * 0.4);
    for (let i = 0; i < 12; i++) {
      const ch1 = e.icon[0][i] || ' ';
      const ch2 = e.icon[1][i] || ' ';
      putChar(ch1, ic0 + i, r0 + 1, iconCol1, a1 * flicker(i));
      putChar(ch2, ic0 + i, r0 + 2, iconCol2, a1 * flicker(i + 7));
    }

    // tag line, centered
    const tagW = Math.min(e.tag.length, innerW);
    const tc0 = c0 + 2 + Math.max(0, Math.floor((innerW - tagW) / 2));
    putText(e.tag.slice(0, tagW), tc0, r0 + 3, innerCol, al);

    // bottom border with action  в””в”Җ[ вҶө RUN ]в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ
    let action;
    if (e.live) action = hovered ? '[ вҶө RUN ]' : '[   RUN   ]';
    else action = '( queued  )';
    const bot = 'в””в”Җ' + action + 'в”Җ'.repeat(Math.max(0, TW - 4 - action.length)) + 'в”ҳ';
    for (let i = 0; i < TW; i++) {
      const ch = bot[i] || ' ';
      const isAction = i >= 2 && i < 2 + action.length;
      const col = isAction ? (hovered ? ACCENT : (e.live ? HI : LOW)) : focusCol;
      const a  = isAction && hovered ? (0.7 + 0.3 * Math.sin(t * 0.18)) : al;
      putChar(ch, c0 + i, r0 + TH - 1, col, a);
    }

    if (e.live && e.href) {
      addHit(c0, r0, TW, TH, () => { window.location.href = e.href; });
    }
  }

  function drawDesktop(box) {
    const startR = box.menuSep + 4;
    const endR = box.statSep - 2;
    const availW = box.x1 - box.x0 - 4;
    const availH = endR - startR;

    const gapX = 2, gapY = 1;
    const tilesPerRow = Math.max(1, Math.min(ENTRIES.length, Math.floor((availW + gapX) / (TW + gapX))));
    const totalRows = Math.ceil(ENTRIES.length / tilesPerRow);
    const gridH = totalRows * TH + (totalRows - 1) * gapY;
    const gridW = tilesPerRow * TW + (tilesPerRow - 1) * gapX;
    const gridC0 = box.x0 + 2 + Math.max(0, Math.floor((availW - gridW) / 2));
    const gridR0 = startR + Math.max(0, Math.floor((availH - gridH) / 2));

    ENTRIES.forEach((e, i) => {
      const tr = Math.floor(i / tilesPerRow);
      const tc = i % tilesPerRow;
      const c0 = gridC0 + tc * (TW + gapX);
      const r0 = gridR0 + tr * (TH + gapY);
      drawTile(e, c0, r0, i);
    });
  }

  // в”Җв”Җ status bar at bottom в”Җв”Җ
  function drawStatusBar(box) {
    const r = box.y1 - 1;

    // function keys
    const keys = [
      { k: 'F1', label: 'HELP', action: () => window.open('https://github.com/willbearfruits/characterworld', '_blank') },
      { k: 'F2', label: 'PAINT', action: () => location.href = 'charactershop/' },
      { k: 'F3', label: 'FILM', action: () => location.href = 'characterfilm/' },
      { k: 'F4', label: 'GRAIN', action: () => location.href = 'charactergrain/' },
      { k: 'F5', label: 'TRACK', action: () => location.href = 'charactertracker/' },
      { k: 'F6', label: 'DELVE', action: () => location.href = 'characterdelve/' },
    ];
    let cx = box.x0 + 2;
    for (const fk of keys) {
      const seg = fk.k + ' ' + fk.label;
      if (cx + seg.length + 2 > box.x1 - 22) break;
      const hovered = mouseR === r && mouseC >= cx && mouseC < cx + seg.length;
      putText(fk.k, cx, r, hovered ? ACCENT : ACCENT, hovered ? 1 : 0.9);
      putText(' ' + fk.label, cx + 2, r, hovered ? ACCENT : HI, hovered ? 1 : 0.85);
      addHit(cx, r, seg.length, 1, fk.action);
      cx += seg.length + 2;
    }

    // right side: MEM bar + glyph rate (decorative)
    const memSlots = 8;
    const memFill = Math.floor(memSlots * (0.55 + 0.25 * Math.sin(t * 0.013) + 0.1 * Math.sin(t * 0.07)));
    let memBar = '';
    for (let i = 0; i < memSlots; i++) memBar += i < memFill ? 'в–“' : 'в–‘';
    const rate = 1800 + Math.floor(600 * (0.5 + 0.5 * Math.sin(t * 0.019)));
    const right = 'MEM ' + memBar + ' В· ' + rate + ' glyph/s';
    if (box.x1 - right.length - 2 > cx + 2) {
      // MEM label
      putText('MEM ', box.x1 - right.length - 2, r, MID, 0.85);
      // bar with color split
      for (let i = 0; i < memSlots; i++) {
        const col = i < memFill ? (i > 5 ? WARM : HI) : DIM;
        putChar(memBar[i], box.x1 - right.length - 2 + 4 + i, r, col, 0.9);
      }
      putText(' В· ' + rate + ' glyph/s', box.x1 - right.length - 2 + 4 + memSlots, r, MID, 0.85);
    }
  }

  // в”Җв”Җ cursor в”Җв”Җ
  function drawCursor() {
    if (mouseC < 0 || mouseR < 0) return;
    const h = hitAt(mouseC, mouseR);
    const mark = h ? 'в—Ҳ' : '+';
    const color = h ? ACCENT : HI;
    const alpha = 0.7 + 0.3 * Math.sin(t * 0.2);
    putChar(mark, mouseC, mouseR, color, alpha);
  }

  function render() {
    t++;
    ctx.fillStyle = BG;
    ctx.fillRect(0, 0, cv.width, cv.height);
    hits = [];

    drawBackground();
    const box = drawOuterFrame();
    drawMenuBar(box);
    drawPrompt(box);
    drawDesktop(box);
    drawStatusBar(box);
    drawCursor();

    requestAnimationFrame(render);
  }
  render();

  // keyboard shortcuts
  window.addEventListener('keydown', (e) => {
    const map = {
      '1': 'charactershop/',
      '2': 'characterfilm/',
      '3': 'charactergrain/',
      '4': 'charactertracker/',
      '5': 'characterdelve/',
    };
    const fmap = {
      'F1': 'github',
      'F2': 'charactershop/',
      'F3': 'characterfilm/',
      'F4': 'charactergrain/',
      'F5': 'charactertracker/',
      'F6': 'characterdelve/',
    };
    if (map[e.key]) { window.location.href = map[e.key]; return; }
    if (fmap[e.key]) {
      e.preventDefault();
      if (fmap[e.key] === 'github') window.open('https://github.com/willbearfruits/characterworld', '_blank');
      else window.location.href = fmap[e.key];
      return;
    }
    if (e.key === 'g' || e.key === 'G') window.open('https://github.com/willbearfruits/characterworld', '_blank');
  });
})();
</script>
</body>
</html>
