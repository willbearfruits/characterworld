<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>characterworld</title>
<meta name="description" content="A directory of character-only browser pieces вАФ every visible form built from typed glyphs.">
<meta name="author" content="willbear / glitches">
<meta name="theme-color" content="#030403">
<meta property="og:type" content="website">
<meta property="og:title" content="characterworld">
<meta property="og:description" content="A directory of character-only browser pieces. Every visible form is a typed glyph.">
<meta property="og:image" content="https://willbearfruits.github.io/characterworld/charactershop/og.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:url" content="https://willbearfruits.github.io/characterworld/">
<meta property="og:site_name" content="characterworld">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="characterworld">
<meta name="twitter:description" content="A directory of character-only browser pieces.">
<meta name="twitter:image" content="https://willbearfruits.github.io/characterworld/charactershop/og.png">
<link rel="icon" href="data:image/svg+xml;utf8,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%2064%2064%22%3E%3Crect%20width%3D%2264%22%20height%3D%2264%22%20fill%3D%22%23030403%22%2F%3E%3Ctext%20x%3D%2250%25%22%20y%3D%2254%22%20text-anchor%3D%22middle%22%20font-family%3D%22Courier%20New%2Cmonospace%22%20font-size%3D%2256%22%20font-weight%3D%22bold%22%20fill%3D%22%23fff16a%22%3E%E2%8C%96%3C%2Ftext%3E%3C%2Fsvg%3E">
<style>
html,body{margin:0;height:100%;overflow:hidden;background:#030403;color:#d8f0c0;font-family:"Courier New",Courier,monospace}
body{cursor:none;user-select:none;-webkit-user-select:none}
canvas{display:block;width:100vw;height:100vh;background:#030403}
a{color:inherit;text-decoration:none}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(() => {
  const cv = document.getElementById('c');
  const ctx = cv.getContext('2d');
  const BG = '#030403', DIM = '#2a3a2a', LOW = '#566956', MID = '#708a70', HI = '#d8f0c0', ACCENT = '#fff16a', WARM = '#ff8a5c', COOL = '#6ab7ff';

  const GLYPHS = 'вЦСвЦТвЦУвЦИвЦБвЦВвЦГвЦДвЦЕвЦЖвЦЗвФЉвХ≥¬ЈвИЩвАҐвИШвЧЛвЧ¶вЧМвЧНвЧОвЧѓвИівИµвЛЃвЛѓвЦ™вЦЂвЧЖвЧЗвАєвАЇ¬Ђ¬ї/\\|¬¶вА†вА°¬І¬ґ'.split('');
  const ABOVE = ['\u0301','\u0302','\u0303','\u0306','\u030c','\u0342','\u035b','\u0360','\u0363','\u036a','\u036c'];

  let cell = 16, cols = 0, rows = 0, dpr = 1;
  let mouseC = -1, mouseR = -1, pressed = false, pressX = -1, pressY = -1;
  let t = 0;

  // directory of sibling projects вАФ the only content source
  const ENTRIES = [
    { id: '01', name: 'ATELIER', note: 'photoshop-style character-only paint program ¬Ј beta', href: 'charactershop/', live: true },
    { id: '02', name: 'FILM   ', note: 'character-only video editor ¬Ј webcam вЖТ glyphs ¬Ј beta', href: 'characterfilm/', live: true },
    { id: '03', name: 'вАФвАФвАФвАФвАФвАФ', note: 'more character-only pieces coming soon',      href: null,             live: false },
  ];

  function resize() {
    dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
    const w = window.innerWidth, h = window.innerHeight;
    cv.width = w * dpr; cv.height = h * dpr;
    cv.style.width = w + 'px'; cv.style.height = h + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    cell = Math.max(12, Math.min(20, Math.floor(Math.min(w, h) / 44)));
    cols = Math.floor(w / cell);
    rows = Math.floor(h / cell);
    ctx.font = `bold ${Math.floor(cell * 1.02)}px "Courier New", Courier, monospace`;
    ctx.textBaseline = 'top';
    ctx.textAlign = 'center';
  }
  resize();
  window.addEventListener('resize', resize);

  // pointer вЖТ cell
  function updatePointer(e) {
    const r = cv.getBoundingClientRect();
    const x = (e.clientX ?? (e.touches?.[0]?.clientX)) - r.left;
    const y = (e.clientY ?? (e.touches?.[0]?.clientY)) - r.top;
    mouseC = Math.floor(x / cell);
    mouseR = Math.floor(y / cell);
  }
  cv.addEventListener('mousemove', updatePointer);
  cv.addEventListener('mousedown', (e) => { updatePointer(e); pressed = true; pressX = mouseC; pressY = mouseR; });
  cv.addEventListener('mouseup', (e) => { updatePointer(e); pressed = false; handleClick(); });
  cv.addEventListener('mouseleave', () => { mouseC = mouseR = -1; pressed = false; });
  cv.addEventListener('touchstart', (e) => { updatePointer(e); pressed = true; pressX = mouseC; pressY = mouseR; }, { passive: true });
  cv.addEventListener('touchmove', updatePointer, { passive: true });
  cv.addEventListener('touchend', (e) => { pressed = false; handleClick(); });

  // hit-test rects rebuilt each frame
  let hits = [];
  function addHit(c, r, w, h, action) { hits.push({ c, r, w, h, action }); }
  function hitAt(c, r) {
    for (let i = hits.length - 1; i >= 0; i--) {
      const b = hits[i];
      if (c >= b.c && c < b.c + b.w && r >= b.r && r < b.r + b.h) return b;
    }
    return null;
  }
  function handleClick() {
    const h = hitAt(mouseC, mouseR);
    if (h && h.action) h.action();
  }

  function putChar(ch, c, r, color, alpha) {
    ctx.globalAlpha = alpha ?? 1;
    ctx.fillStyle = color;
    ctx.fillText(ch, c * cell + cell / 2, r * cell + (cell - Math.floor(cell * 1.02)) / 2 + 1);
    ctx.globalAlpha = 1;
  }
  function putText(s, c, r, color, alpha) {
    for (let i = 0; i < s.length; i++) putChar(s[i], c + i, r, color, alpha);
  }
  function putTextCenter(s, r, color, alpha) {
    const c = Math.floor((cols - s.length) / 2);
    putText(s, c, r, color, alpha);
  }

  // seeded hash for stable background pattern
  function h2(x, y) {
    let n = (x * 374761393 + y * 668265263) ^ 0x27d4eb2d;
    n = (n ^ (n >>> 15)) * 2246822519;
    n = (n ^ (n >>> 13)) * 3266489917;
    return ((n ^ (n >>> 16)) >>> 0) / 0xffffffff;
  }

  function drawBackground() {
    // slow, sparse glyph field вАФ a flowing density map
    const phase = t * 0.004;
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const hn = h2(c, r);
        const wave = 0.5 + 0.5 * Math.sin(phase + c * 0.09 - r * 0.11 + hn * 6.28);
        const d = wave * (0.35 + hn * 0.45);
        if (d < 0.55) continue;
        const g = GLYPHS[Math.floor((hn * 137 + t * 0.02) % GLYPHS.length + GLYPHS.length) % GLYPHS.length];
        const col = d > 0.88 ? LOW : DIM;
        putChar(g, c, r, col, d > 0.88 ? 0.55 : 0.38);
      }
    }
  }

  function drawFrame() {
    // thin box frame around the content area
    const pad = 2;
    const x0 = pad, y0 = pad, x1 = cols - pad - 1, y1 = rows - pad - 1;
    for (let c = x0 + 1; c < x1; c++) { putChar('вФА', c, y0, LOW, 0.6); putChar('вФА', c, y1, LOW, 0.6); }
    for (let r = y0 + 1; r < y1; r++) { putChar('вФВ', x0, r, LOW, 0.6); putChar('вФВ', x1, r, LOW, 0.6); }
    putChar('вФМ', x0, y0, LOW, 0.7); putChar('вФР', x1, y0, LOW, 0.7);
    putChar('вФФ', x0, y1, LOW, 0.7); putChar('вФШ', x1, y1, LOW, 0.7);
    return { x0, y0, x1, y1 };
  }

  function drawHeader() {
    // top-of-frame tag
    const tag = ' characterworld ¬Ј index ';
    const c = 4;
    putText(tag, c, 2, MID, 0.9);
    // accent corner
    putChar('вМЦ', cols - 5, 2, ACCENT, 0.9);
    // date
    const date = '2026';
    putText(date, cols - 9, 2, MID, 0.7);
  }

  function drawTitle(box) {
    // giant block title вАФ rendered as stacked character rows forming glyph shapes
    const titleRow = box.y0 + 3;
    // "characterworld" in big letters? Keep it monospace-typed but enlarged via combining marks row.
    const title = 'characterworld';
    const sub = 'a meta-folder of character-only browser pieces';
    const decor = '¬Ј  ¬Ј  ¬Ј  ¬Ј  ¬Ј';
    putTextCenter(title, titleRow, HI, 1);
    // underline with dashes that breathe
    const breathe = 0.55 + 0.45 * Math.sin(t * 0.04);
    const lineC = Math.floor((cols - title.length) / 2);
    for (let i = 0; i < title.length; i++) {
      const ch = (i + Math.floor(t * 0.05)) % 6 === 0 ? 'вФБ' : 'вФА';
      putChar(ch, lineC + i, titleRow + 1, LOW, 0.35 + 0.4 * breathe);
    }
    putTextCenter(sub, titleRow + 3, MID, 0.9);
    putTextCenter(decor, titleRow + 4, DIM, 0.7);
  }

  function drawEntries(box) {
    const startRow = Math.max(box.y0 + 10, Math.floor(rows / 2) - Math.floor(ENTRIES.length * 1.5));
    const maxName = Math.max(...ENTRIES.map(e => e.name.length));
    const maxNote = Math.max(...ENTRIES.map(e => e.note.length));
    const inner = 4 + maxName + 4 + maxNote + 6;
    const c0 = Math.max(box.x0 + 3, Math.floor((cols - inner) / 2));

    ENTRIES.forEach((e, i) => {
      const r = startRow + i * 3;
      const hovered = mouseR === r && mouseC >= c0 && mouseC < c0 + inner && e.href;
      const color = e.live ? (hovered ? ACCENT : HI) : LOW;
      const alpha = e.live ? 1 : 0.6;

      // row bracket
      const bracketL = hovered ? 'вЦЄ' : (e.live ? '[' : ' ');
      const bracketR = hovered ? 'вЧВ' : (e.live ? ']' : ' ');
      putText(bracketL + ' ' + e.id + ' ' + bracketR, c0, r, e.live ? (hovered ? ACCENT : MID) : DIM, alpha);

      // name
      const nameC = c0 + 8;
      putText(e.name.padEnd(maxName, ' '), nameC, r, color, alpha);

      // divider
      putChar('¬Ј', nameC + maxName + 1, r, DIM, 0.6);

      // note
      const noteC = nameC + maxName + 3;
      putText(e.note, noteC, r, e.live ? (hovered ? HI : MID) : LOW, alpha);

      // arrow + hover shimmer
      if (e.live) {
        const arrowC = noteC + maxNote + 2;
        const shimmer = hovered ? (0.5 + 0.5 * Math.sin(t * 0.18)) : 0.7;
        putChar('вЖТ', arrowC, r, hovered ? ACCENT : MID, shimmer);
      }

      // register hit
      if (e.live && e.href) {
        addHit(c0, r, inner, 1, () => { window.location.href = e.href; });
      }

      // decoration row below each entry
      if (hovered && e.live) {
        for (let k = 0; k < inner; k++) {
          putChar('¬Ј', c0 + k, r + 1, LOW, 0.25 + 0.25 * Math.sin(t * 0.1 + k * 0.3));
        }
      }
    });
  }

  function drawFooter(box) {
    const r = box.y1 - 2;
    const left = ' willbear ¬Ј glitches ';
    const right = ' github.com/willbearfruits/characterworld вЖТ ';
    putText(left, box.x0 + 2, r, MID, 0.8);
    putText(right, box.x1 - right.length - 1, r, MID, 0.8);

    // register hit for the github link
    addHit(box.x1 - right.length - 1, r, right.length, 1, () => {
      window.open('https://github.com/willbearfruits/characterworld', '_blank');
    });

    // law line
    const law = 'every visible form is a typed glyph ¬Ј no images ¬Ј no svg ¬Ј no path geometry';
    putTextCenter(law, box.y1 - 4, LOW, 0.7);
  }

  function drawCursor() {
    if (mouseC < 0 || mouseR < 0) return;
    const h = hitAt(mouseC, mouseR);
    const mark = h ? 'вЧИ' : '¬Ј';
    const color = h ? ACCENT : HI;
    const alpha = 0.7 + 0.3 * Math.sin(t * 0.2);
    // little cross ring
    putChar(mark, mouseC, mouseR, color, alpha);
    if (h) {
      putChar('вХі', mouseC - 1, mouseR, color, 0.5);
      putChar('вХґ', mouseC + 1, mouseR, color, 0.5);
      putChar('вХЈ', mouseC, mouseR + 1, color, 0.5);
      putChar('вХµ', mouseC, mouseR - 1, color, 0.5);
    }
  }

  function render() {
    t++;
    // clear
    ctx.fillStyle = BG;
    ctx.fillRect(0, 0, cv.width, cv.height);
    hits = [];

    drawBackground();
    const box = drawFrame();
    drawHeader();
    drawTitle(box);
    drawEntries(box);
    drawFooter(box);
    drawCursor();

    requestAnimationFrame(render);
  }
  render();

  // keyboard shortcut: 1 вЖТ atelier
  window.addEventListener('keydown', (e) => {
    if (e.key === '1') window.location.href = 'charactershop/';
    if (e.key === '2') window.location.href = 'characterfilm/';
    if (e.key === 'g' || e.key === 'G') window.open('https://github.com/willbearfruits/characterworld', '_blank');
  });
})();
</script>
</body>
</html>
